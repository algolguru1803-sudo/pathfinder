<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ai-pathfinder — задача</title>
<style>
  :root {
    --bg: #fbfbfa; --panel: #ffffff; --ink: #1f2328; --muted: #6b7280;
    --line: #e5e7eb; --accent: #4f46e5; --accent-soft: #eef2ff;
    --ok: #16a34a; --warn: #d97706; --chip: #f3f4f6;
    --reply-bg: #f0fdf4; --reply-line: #bbf7d0;
    --sel: #fef9c3; --shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
    --grid: rgba(0,0,0,.06);
    /* фазовые тинты таймлайна (фон-регионы) */
    --ph-explore: rgba(14,165,233,.13);  --ph-explore-line: #0ea5e9;
    --ph-elaborate: rgba(139,92,246,.13); --ph-elaborate-line: #8b5cf6;
    --ph-implement: rgba(16,185,129,.13); --ph-implement-line: #10b981;
    --ph-verify: rgba(245,158,11,.14);    --ph-verify-line: #f59e0b;
    --ph-none: rgba(100,116,139,.08);     --ph-none-line: #94a3b8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115; --panel: #181b21; --ink: #e6e8eb; --muted: #9aa3af;
      --line: #2a2f37; --accent: #818cf8; --accent-soft: #1e2230;
      --chip: #232830; --reply-bg: #132019; --reply-line: #1f4d31;
      --sel: #3b3a1f; --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
      --grid: rgba(255,255,255,.07);
      --ph-explore: rgba(14,165,233,.18);  --ph-elaborate: rgba(139,92,246,.18);
      --ph-implement: rgba(16,185,129,.18); --ph-verify: rgba(245,158,11,.18);
      --ph-none: rgba(148,163,184,.12);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: 96px;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  header.top {
    position: sticky; top: 0; z-index: 20; background: var(--bg);
    border-bottom: 1px solid var(--line); padding: 14px 20px;
  }
  .top-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  h1.title { font-size: 18px; margin: 0; font-weight: 650; flex: 1 1 280px; }
  a.hub-link { font-size: 12px; font-weight: 600; color: var(--muted); text-decoration: none; white-space: nowrap; padding: 3px 10px; border-radius: 999px; flex: none; }
  a.hub-link:hover { color: var(--accent); background: var(--accent-soft); }
  .badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--chip); white-space: nowrap; }
  .badge.phase { background: var(--accent-soft); color: var(--accent); }
  .status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .status.working { background: var(--accent-soft); color: var(--accent); }
  .status.awaiting { background: #fff7ed; color: var(--warn); }
  @media (prefers-color-scheme: dark) { .status.awaiting { background: #2a2113; } }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .status.working .dot { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .progress { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin-top: 10px; }
  .progress > div { height: 100%; background: var(--accent); width: 0; transition: width .4s; }

  section.card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px 20px; margin: 16px 0; box-shadow: var(--shadow); }
  section.card > h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 12px; }
  .md p { margin: 0 0 10px; }
  .md h1 { font-size: 20px; font-weight: 700; margin: 18px 0 8px; }
  .md h2 { font-size: 17px; font-weight: 700; margin: 16px 0 7px; }
  .md h3 { font-size: 15px; margin: 14px 0 6px; }
  .md h4 { font-size: 13px; font-weight: 700; margin: 12px 0 4px; color: var(--muted); }
  .md ul, .md ol { margin: 6px 0 10px; padding-left: 22px; } .md li { margin: 2px 0; }
  .md code { background: var(--chip); padding: 1px 5px; border-radius: 5px; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .md pre { background: var(--chip); padding: 12px 14px; border-radius: 8px; overflow: auto; }
  .md pre code { background: none; padding: 0; } .md a { color: var(--accent); }
  .md em { font-style: italic; }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 14px 0; }
  .md blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 4px 12px; color: var(--muted); }
  .md table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
  .md th, .md td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .md th { background: var(--chip); font-weight: 600; }
  .md tr:nth-child(even) td { background: var(--accent-soft); }

  .block { position: relative; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin: 10px 0; transition: border-color .15s, background .15s; }
  .block:hover { border-color: var(--accent); }
  .block.has-draft { border-color: var(--accent); background: var(--accent-soft); }
  .block-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .block-title { font-weight: 600; flex: 1; }
  .block-id { font: 11px ui-monospace, monospace; color: var(--muted); }
  ::selection { background: var(--sel); }
  textarea { width: 100%; min-height: 56px; resize: vertical; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; background: var(--bg); color: var(--ink); }

  /* commentable prose regions (summary / codebase map) */
  .region { position: relative; }
  .region.has-draft { border-left: 3px solid var(--accent); padding-left: 11px; }

  /* a fragment the human has commented on, highlighted inline */
  mark.commented { background: var(--sel); color: inherit; border-radius: 3px; padding: 0 1px; cursor: pointer; box-shadow: inset 0 -2px 0 var(--accent); }
  .flash { animation: flashpulse 1.1s ease; }
  @keyframes flashpulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } 30% { box-shadow: 0 0 0 3px var(--accent); } }

  /* a left comment card (quote + text) shown under its region */
  .cmt { margin-top: 8px; background: var(--accent-soft); border-radius: 8px; padding: 8px 10px; font-size: 13px; scroll-margin-top: 120px; }
  .cmt-quote { color: var(--muted); border-left: 3px solid var(--accent); padding: 1px 8px; margin-bottom: 5px; white-space: pre-wrap; cursor: pointer; }
  .cmt-row { display: flex; gap: 8px; align-items: flex-start; }
  .cmt-text { flex: 1; }
  .cmt .x { cursor: pointer; color: var(--muted); font-weight: 700; }

  .reply { margin-top: 8px; background: var(--reply-bg); border: 1px solid var(--reply-line); border-radius: 8px; padding: 8px 10px; font-size: 13px; }
  .reply .who { font-weight: 600; color: var(--ok); font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }

  .question { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin: 10px 0; }
  .question.answered { border-color: var(--ok); }
  .q-text { font-weight: 600; margin-bottom: 8px; }
  .opt { display: block; padding: 4px 0; cursor: pointer; }
  /* own free-form answer under choice options + per-variant comment label */
  .own-answer { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 10px; }
  .own-lbl { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .own-answer textarea { min-height: 40px; }

  /* visual-demo variants */
  .demo-intro { margin-bottom: 12px; }
  .variants { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .variant { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
  .variant:hover { border-color: var(--accent); }
  .variant.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .variant-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--chip); cursor: pointer; }
  .variant.sel .variant-head { background: var(--accent-soft); }
  .variant-head .v-title { font-weight: 600; flex: 1; }
  .variant-head .open { font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
  iframe.mock { display: block; width: 100%; height: 420px; border: none; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: #fff; }
  .v-body { padding: 10px 12px; }
  .v-body .region { padding: 0; }
  .v-body .region.has-draft { border-left: none; padding-left: 0; }
  .v-body .region .md { margin-bottom: 10px; }
  .v-comment { margin-top: 4px; }
  .v-comment textarea { min-height: 40px; }
  .v-comment-row { display: flex; justify-content: flex-end; margin-top: 6px; }
  .v-comment-send { padding: 6px 12px; font-size: 13px; }

  .ws { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--line); }
  .ws:last-child { border-bottom: none; }
  .ws .chip { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 999px; }
  .ws .todo { background: var(--chip); color: var(--muted); }
  .ws .in_progress { background: var(--accent-soft); color: var(--accent); }
  .ws .done { background: var(--reply-bg); color: var(--ok); }

  .actionbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 30; background: var(--panel); border-top: 1px solid var(--line); box-shadow: 0 -4px 16px rgba(0,0,0,.06); }
  .actionbar-inner { max-width: 1200px; margin: 0 auto; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  .queue { font-size: 13px; color: var(--muted); flex: 1; }
  .queue b { color: var(--ink); }
  button.primary { background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
  button.primary:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 10px 16px; font-weight: 600; cursor: pointer; }
  button.ghost:hover { border-color: var(--accent); }
  .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 10px 18px; border-radius: 10px; font-size: 13px; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { color: var(--muted); font-style: italic; }
  /* inline comment input that appears at a text selection */
  #sel-popover { position: absolute; display: none; z-index: 40; width: 280px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); padding: 8px; }
  #sel-popover.open { display: block; }
  #sel-input { min-height: 34px; resize: none; }
  #sel-popover .sel-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  #sel-popover .hint { font-size: 11px; color: var(--muted); flex: 1; }
  #sel-popover button.primary { padding: 6px 12px; font-size: 13px; }

  /* tabs */
  .tabbar { display: flex; gap: 2px; margin-top: 10px; }
  .tab { appearance: none; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font: inherit; font-weight: 600; font-size: 14px; padding: 8px 12px; cursor: pointer; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  [hidden] { display: none !important; }

  /* trace tab */
  .stats { display: flex; flex-wrap: wrap; gap: 12px; }
  .stat { background: var(--chip); border-radius: 10px; padding: 10px 14px; min-width: 104px; }
  .stat .v { font-size: 20px; font-weight: 680; line-height: 1.2; }
  .stat .k { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .bymodel { font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* timeline (Вариант C): token-overview + phases + brush + detail zone */
  .g-legend { display: flex; flex-wrap: wrap; gap: 6px 12px; margin: 0 0 8px; align-items: center; }
  .g-legend.ph { margin-top: 0; }
  .g-legend .lchip { background: none; padding: 0; font-weight: 400; color: var(--muted); }
  .g-legend .ldot { width: 10px; height: 10px; border-radius: 3px; }
  .g-legend .ldot.run { background: repeating-linear-gradient(45deg, var(--muted) 0 3px, transparent 3px 6px); }
  .g-legend .ldot.err { background: transparent; outline: 2px solid #ef4444; outline-offset: -2px; }
  .g-legend .lbar { width: 16px; height: 10px; border-radius: 2px; border: 1px solid var(--line); flex: none; }
  .legtitle { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-right: 2px; }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 8px; }

  .ov { position: relative; border: 1px solid var(--line); border-radius: 10px; padding: 0; overflow: hidden; }
  .ov-phases { position: relative; border-bottom: 1px solid var(--line); background: var(--panel); }
  .ov-phband { position: absolute; height: 16px; display: flex; align-items: center; padding: 0 5px; font: 10px ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; overflow: hidden; border-left: 2px solid var(--muted); }
  .ov-svg { display: block; width: 100%; height: 78px; cursor: crosshair; }
  .ov-axis { position: relative; height: 20px; border-top: 1px solid var(--line); background: var(--panel); }
  .ov-tick { position: absolute; top: 3px; font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); transform: translateX(-50%); }
  .ov-brush { position: absolute; height: 78px; background: var(--accent-soft); border-left: 2px solid var(--accent); border-right: 2px solid var(--accent); opacity: .5; pointer-events: none; }
  .ov-hint { font-size: 11px; color: var(--muted); margin: 8px 2px 0; }

  .det-wrap { margin-top: 14px; overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
  .det-inner { position: relative; min-width: 640px; }
  .det-phases { position: relative; height: 16px; border-bottom: 1px solid var(--line); }
  .det-phband { position: absolute; top: 0; height: 16px; display: flex; align-items: center; padding: 0 5px; font: 10px ui-monospace, monospace; white-space: nowrap; overflow: hidden; border-left: 2px solid var(--muted); }
  .det-axis { position: relative; height: 22px; border-bottom: 1px solid var(--line); }
  .det-tick { position: absolute; top: 4px; left: 0; font: 11px ui-monospace, monospace; color: var(--muted); }
  .det-tick::before { content: ""; position: absolute; left: 0; top: -4px; height: 999px; border-left: 1px solid var(--grid); }
  .det-phbg { position: absolute; top: 0; bottom: 0; z-index: 0; pointer-events: none; }
  .det-lanes { position: relative; z-index: 1; }
  .det-lane { position: relative; height: 28px; border-bottom: 1px dashed var(--line); }
  .det-bar { position: absolute; top: 4px; height: 20px; border-radius: 5px; display: flex; align-items: center; gap: 5px; padding: 0 7px; font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.18); border-left: 3px solid rgba(0,0,0,.28); cursor: pointer; min-width: 4px; }
  .det-bar:hover { filter: brightness(1.08); box-shadow: 0 0 0 2px var(--accent); z-index: 3; }
  .det-bar.err { outline: 2px solid #ef4444; outline-offset: -2px; }
  .det-bar.running { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.28) 0 6px, transparent 6px 12px); }
  .det-bar .du { opacity: .85; font: 10px ui-monospace, monospace; }
  .det-dot { position: absolute; top: 9px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--panel); cursor: pointer; z-index: 2; }
  .det-empty { padding: 16px; font-size: 13px; color: var(--muted); text-align: center; }

  #g-tip { position: fixed; z-index: 50; max-width: 330px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); padding: 10px 12px; font-size: 12px; pointer-events: none; display: none; }
  #g-tip .h { font-weight: 700; margin-bottom: 4px; }
  #g-tip .s { color: var(--muted); margin-bottom: 6px; }
  #g-tip .kv { display: grid; grid-template-columns: auto 1fr; gap: 1px 10px; }
  #g-tip .kv .k { color: var(--muted); } #g-tip .kv .v { text-align: right; font-variant-numeric: tabular-nums; }

  .phase-h { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 16px 0 4px; font-weight: 700; }
  .agent { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin: 8px 0; }
  .agent.err { border-color: #ef4444; }
  .agent.orch { background: var(--accent-soft); }
  .agent-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .role { font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 999px; color: #fff; }
  .agent-head .ws { border: none; padding: 0; font-size: 13px; color: var(--muted); }
  .tag { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 999px; background: var(--chip); color: var(--muted); }
  .tag.bg { background: var(--accent-soft); color: var(--accent); }
  .tag.fail { background: #fef2f2; color: #ef4444; }
  @media (prefers-color-scheme: dark) { .tag.fail { background: #2a1414; } }
  .metrics { display: flex; flex-wrap: wrap; gap: 12px 22px; margin-top: 10px; }
  .metric .k { font-size: 11px; color: var(--muted); } .metric .v { font-weight: 650; }
  .ctxbar { height: 7px; background: var(--line); border-radius: 999px; overflow: hidden; width: 150px; margin-top: 4px; }
  .ctxbar > div { height: 100%; background: var(--accent); }
  .ctxbar > div.hot { background: var(--warn); }
  .muted { color: var(--muted); font-weight: 400; }

  /* trace tab: live action feed (grouped by agent/lane, v2 layout) */
  .feed-live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-soft); padding: 3px 10px; border-radius: 999px; float: right; }
  .feed-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: feed-pulse 1.2s ease-in-out infinite; }
  @keyframes feed-pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  .feed-agent { border: 1px solid var(--line); border-radius: 11px; margin: 12px 0; overflow: hidden; }
  .feed-agent.running .feed-agent-head { box-shadow: inset 3px 0 0 var(--accent); }
  .feed-agent-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--chip); cursor: pointer; }
  .feed-caret { color: var(--accent); font-size: 12px; transition: transform .15s; display: inline-block; }
  .feed-agent.open .feed-caret { transform: rotate(90deg); }
  .feed-role { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; color: #fff; }
  .feed-sub { font-size: 12px; color: var(--muted); }
  .feed-agent-meta { font-size: 12px; color: var(--muted); margin-left: auto; }
  .feed-body { display: none; }
  .feed-agent.open .feed-body { display: block; }
  .feed-timeline { padding: 8px 14px 12px; position: relative; }
  .feed-timeline::before { content: ""; position: absolute; left: 20px; top: 8px; bottom: 12px; width: 2px; background: var(--line); }
  .feed-row { position: relative; padding: 5px 0 5px 28px; }
  .feed-row::before { content: ""; position: absolute; left: 15px; top: 8px; width: 9px; height: 9px; border-radius: 50%; background: var(--line); border: 2px solid var(--panel); }
  .feed-row.running::before { background: var(--accent); }
  .feed-row.err::before { background: #ef4444; }
  .feed-line { display: flex; align-items: baseline; gap: 7px; }
  .feed-t { font: 11px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); min-width: 46px; }
  .feed-tool { font: 11px ui-monospace, monospace; font-weight: 700; padding: 1px 7px; border-radius: 6px; background: var(--bg); color: var(--ink); }
  .feed-arg { font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); word-break: break-all; }
  .feed-dur { margin-left: auto; font: 11px ui-monospace, monospace; color: var(--muted); white-space: nowrap; }
  .feed-dur.run { color: var(--accent); }
  .feed-msgbtn { margin: 4px 14px 12px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: 1px dashed var(--line); border-radius: 9px; background: var(--accent-soft); padding: 6px 10px; font-size: 13px; font-weight: 600; }
  .feed-mcaret { color: var(--accent); font-size: 12px; display: inline-block; transition: transform .15s; }
  .feed-msgbtn.open .feed-mcaret { transform: rotate(90deg); }
  .feed-msgs { padding: 0 14px 12px; }
  .feed-msg { padding: 6px 0 6px 8px; border-left: 2px solid var(--line); margin: 6px 0; font-size: 13px; line-height: 1.55; }
  .feed-msg .feed-t { display: block; margin-bottom: 2px; }
  .feed-empty { font-size: 13px; color: var(--muted); padding: 4px 14px 12px; }

  /* action-type colours (live feed rows + post-mortem card timeline) */
  :root { --t-tool: #10b981; --t-bash: #d97706; --t-mcp: #ec4899; --t-hook: #0ea5e9; --t-subtask: #8b5cf6; }
  .feed-row.mcp::before { background: var(--t-mcp); }
  .feed-row.bash::before { background: var(--t-bash); }
  .feed-row.tool::before { background: var(--t-tool); }
  .feed-row.mcp.running::before, .feed-row.bash.running::before, .feed-row.tool.running::before { background: var(--accent); }

<script>
const SLUG = new URLSearchParams(location.search).get("slug") || "";
const $ = (s, r=document) => r.querySelector(s);
let draftItems = [];
let lastDataStamp = "";
let lastData = null, lastReplies = null;

function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// --- markdown -> html (GFM: headings h1-h4, ul/ol, table, blockquote, hr, code, bold, italic, links) ---
function md(src){
  if(!src) return "";
  const lines = String(src).split("\n");
  let html = "", inUl = false, inOl = false, inCode = false, inBq = false;
  let code = "";
  // table state: pending = first row buffered awaiting separator; body = collecting data rows
  let tState = "off", tPending = "", tBody = "";

  const inline = t => esc(t)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*\s][^*]*)\*/g, "<em>$1</em>")
    .replace(/(^|[^_\w])_([^_\s][^_]*)_([^_\w]|$)/g, "$1<em>$2</em>$3")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  const splitRow = ln => ln.replace(/^\||\|$/g, "").split("|").map(c => c.trim());
  const isSep = ln => /^\|?([\s:]*-+[\s:]*\|)+[\s:]*-*[\s:]*\|?$/.test(ln.trim());

  const flushTable = () => {
    if(tState !== "off"){
      if(tState === "pending"){
        // no separator came — treat pending row as plain paragraph
        html += "<p>"+tPending+"</p>";
      } else {
        html += tBody + "</tbody></table>";
      }
      tState = "off"; tPending = ""; tBody = "";
    }
  };
  const closeAll = () => {
    if(inUl){ html += "</ul>"; inUl = false; }
    if(inOl){ html += "</ol>"; inOl = false; }
    if(inBq){ html += "</blockquote>"; inBq = false; }
    flushTable();
  };

  for(const ln of lines){
    // fenced code block
    if(ln.trim().startsWith("```")){
      if(inCode){ html += "<pre><code>"+esc(code)+"</code></pre>"; code=""; inCode=false; }
      else { closeAll(); inCode=true; }
      continue;
    }
    if(inCode){ code += ln + "\n"; continue; }

    // GFM table
    const isTableLine = ln.trim().startsWith("|") || (tState !== "off" && ln.includes("|") && !ln.trim().startsWith("#"));
    if(isTableLine){
      if(isSep(ln)){
        if(tState === "pending"){
          // promote pending row to header
          const cells = splitRow(tPending).map(c => `<th>${inline(c)}</th>`).join("");
          html += `<table><thead><tr>${cells}</tr></thead><tbody>`;
          tBody = ""; tState = "body";
        }
        // skip separator line
        continue;
      }
      if(tState === "off"){
        closeAll();  // close lists/bq first
        tState = "pending";
        tPending = ln;  // raw line — will be processed if sep follows
        continue;
      }
      if(tState === "pending"){
        // got another row before separator — flush as paragraph, treat new line as pending
        html += "<p>"+tPending+"</p>";
        tPending = ln; continue;
      }
      // tState === "body"
      const cells = splitRow(ln).map(c => `<td>${inline(c)}</td>`).join("");
      tBody += `<tr>${cells}</tr>`;
      continue;
    }
    // non-table line — close table if open
    if(tState !== "off") flushTable();

    // headings
    const h = ln.match(/^(#{1,4})\s+(.*)/);
    if(h){ closeAll(); const lv = h[1].length; html += `<h${lv}>${inline(h[2])}</h${lv}>`; continue; }

    // horizontal rule (3+ of same char: - * _)
    if(/^[-*_]{3,}$/.test(ln.trim())){ closeAll(); html += "<hr>"; continue; }

    // blockquote
    if(ln.startsWith("> ")){
      if(inUl){ html += "</ul>"; inUl=false; }
      if(inOl){ html += "</ol>"; inOl=false; }
      if(!inBq){ html += "<blockquote>"; inBq=true; }
      html += "<p>"+inline(ln.slice(2))+"</p>"; continue;
    }
    if(inBq && !ln.startsWith("> ")){ html += "</blockquote>"; inBq=false; }

    // unordered list
    if(/^\s*[-*]\s+/.test(ln)){
      if(inOl){ html += "</ol>"; inOl=false; }
      if(!inUl){ html += "<ul>"; inUl=true; }
      html += "<li>"+inline(ln.replace(/^\s*[-*]\s+/, ""))+"</li>"; continue;
    }
    // ordered list
    if(/^\s*\d+\.\s+/.test(ln)){
      if(inUl){ html += "</ul>"; inUl=false; }
      if(!inOl){ html += "<ol>"; inOl=true; }
      html += "<li>"+inline(ln.replace(/^\s*\d+\.\s+/, ""))+"</li>"; continue;
    }

    if(ln.trim() === ""){ closeAll(); continue; }
    closeAll(); html += "<p>"+inline(ln)+"</p>";
  }
  closeAll();
  if(inCode) html += "<pre><code>"+esc(code)+"</code></pre>";
  return html;
}

// --- minimal, dependency-free syntax highlighting for diffs (design v2) ---

function langFromPath(path){

// Highlight one line of code. ALWAYS escapes input; never emits raw user HTML.
// Strings/comments take priority over keywords/numbers/functions.
function highlightCode(line, lang){
  const conf = SYN[lang];
  if(line == null) return "";
  if(!conf) return esc(line);
  const kwSet = new Set(conf.kw || []);
  let out = "";
  let i = 0;
  const n = line.length;
  while(i < n){
    const c = line[i];
    // line comment (whole rest of line)
    if(conf.line && line.startsWith(conf.line, i)){
      out += `<span class="tok-com">${esc(line.slice(i))}</span>`;
      break;
    }
    // block comment /* ... */ (js/css)
    if(conf.block && c === "/" && line[i+1] === "*"){
      let j = line.indexOf("*/", i+2);
      j = j === -1 ? n : j + 2;
      out += `<span class="tok-com">${esc(line.slice(i, j))}</span>`;
      i = j; continue;
    }
    // strings: " ' ` with backslash escapes
    if(c === '"' || c === "'" || c === "`"){
      let j = i + 1;
      while(j < n){
        if(line[j] === "\\"){ j += 2; continue; }
        if(line[j] === c){ j++; break; }
        j++;
      }
      out += `<span class="tok-str">${esc(line.slice(i, j))}</span>`;
      i = j; continue;
    }
    // numbers
    if(/[0-9]/.test(c) && !/[A-Za-z_]/.test(line[i-1] || "")){
      let j = i;
      while(j < n && /[0-9a-fx_.]/i.test(line[j])) j++;
      out += `<span class="tok-num">${esc(line.slice(i, j))}</span>`;
      i = j; continue;
    }
    // identifiers / keywords / function names
    if(/[A-Za-z_$]/.test(c)){
      let j = i;
      while(j < n && /[A-Za-z0-9_$]/.test(line[j])) j++;
      const word = line.slice(i, j);
      // skip whitespace to detect a following "(" (function call/def) or after def/function keyword
      let k = j; while(k < n && line[k] === " ") k++;
      const prevWord = (out.match(/<span class="tok-(?:kw|fn)">([A-Za-z_$]+)<\/span>\s*$/) || [])[1];
      if(kwSet.has(word)){
        out += `<span class="tok-kw">${esc(word)}</span>`;
      } else if(conf.fnKw && prevWord === conf.fnKw){
        out += `<span class="tok-fn">${esc(word)}</span>`;
      } else if(line[k] === "("){
        out += `<span class="tok-fn">${esc(word)}</span>`;
      } else {
        out += esc(word);
      }
      i = j; continue;
    }
    // punctuation
    if(/[{}()\[\];:,.<>=+\-*/%&|!?]/.test(c)){
      out += `<span class="tok-pn">${esc(c)}</span>`;
      i++; continue;
    }
    out += esc(c);
    i++;
  }
  return out;
}

// ----- rendering -----
function render(data, replies){
  lastData = data; lastReplies = replies;
  $("#title").textContent = data.title || "Задача";
  $("#phase").textContent = data.phase || "—";
  $("#iter").textContent = data.iteration ? ("итерация " + data.iteration) : "";
  const st = $("#status"), stt = $("#status-text");
  if((data.status||"working") === "awaiting-batch"){ st.className="status awaiting"; stt.textContent="ждёт ваши правки"; }
  else { st.className="status working"; stt.textContent="агент работает"; }
  const pr = data.progress || {done:0,total:0};
  $("#progress-bar").style.width = (pr.total ? Math.round(100*pr.done/pr.total) : 0) + "%";

  const repliesByBlock = {}, repliesByQ = {};
  (replies.replies || []).forEach(r => {
    if(r.blockId){ (repliesByBlock[r.blockId] = repliesByBlock[r.blockId] || []).push(r); }
    if(r.questionId){ (repliesByQ[r.questionId] = repliesByQ[r.questionId] || []).push(r); }
  });

  let h = "";
  if(data.summary) h += card("Сводка задачи", region("summary", md(data.summary), repliesByBlock));
  if(data.codebaseMap) h += card("Карта кодовой базы", region("codebaseMap", md(data.codebaseMap), repliesByBlock));

  if(data.demo && (data.demo.variants||[]).length) h += card("Демо решения", renderDemo(data.demo, repliesByBlock));

  if((data.planBlocks||[]).length){
    let b = "";
    for(const blk of data.planBlocks){
      const has = draftItems.some(i => i.blockId === blk.id);
      b += `<div class="block ${has?'has-draft':''}" data-block="${esc(blk.id)}" data-anchor="${esc(blk.id)}">
        <div class="block-head"><span class="block-title">${esc(blk.title||"")}</span>
          <span class="block-id">${esc(blk.id)}</span></div>
        <div class="md block-body">${md(blk.body||"")}</div>
        ${regionFooter(blk.id, repliesByBlock)}
      </div>`;
    }
    h += card("План", b);
  }

  if((data.questions||[]).length){
    let q = "";
    for(const item of data.questions){
      const ans = draftItems.find(i => i.kind==="answer" && i.questionId===item.id);
      const reps = repliesByQ[item.id] || [];
      let input;
      if(item.kind === "choice" && (item.options||[]).length){
        // an answer whose text matches no option is the human's own free-form reply
        const ownText = (ans && !item.options.includes(ans.text)) ? ans.text : "";
        const opts = item.options.map(o =>
          `<label class="opt"><input type="radio" name="q-${esc(item.id)}" value="${esc(o)}" ${ans&&ans.text===o?"checked":""}> ${esc(o)}</label>`).join("");
        input = opts + `<div class="own-answer">
          <span class="own-lbl">Или свой ответ:</span>
          <textarea data-answer="${esc(item.id)}" placeholder="Свой вариант ответа…">${esc(ownText)}</textarea>
        </div>`;
      } else {
        input = `<textarea data-answer="${esc(item.id)}" placeholder="Ваш ответ…">${esc(ans?ans.text:"")}</textarea>`;
      }
      q += `<div class="question ${ans?'answered':''}" data-question="${esc(item.id)}" data-kind="${esc(item.kind||'open')}">
        <div class="q-text">${esc(item.text)}</div>${input}
        ${reps.map(r=>`<div class="reply"><div class="who">агент</div>${md(r.text)}</div>`).join("")}
      </div>`;
    }
    h += card("Открытые вопросы", q);
  }

  if((data.workstreams||[]).length){
    let w = "";
    for(const ws of data.workstreams){
      w += `<div class="ws"><span class="chip ${ws.status||'todo'}">${labelWs(ws.status)}</span><span>${esc(ws.title||"")}</span></div>`;
    }
    h += card("Work-streams", w);
  }

  $("#content").innerHTML = h || `<p class="empty">Агент ещё не наполнил дашборд.</p>`;
  wireBlocks();
  highlightComments();
  updateQueue();
}

// ----- interactions -----
function wireBlocks(){
  document.querySelectorAll("[data-remove]").forEach(b => b.onclick = (e) => { e.stopPropagation(); removeDraft(b.getAttribute("data-remove")); });
  document.querySelectorAll("textarea[data-answer]").forEach(t => {
    t.onchange = () => saveAnswer(t.getAttribute("data-answer"), t.value);
    // own free-form answer wins over a picked option: clear radios as the human types
    t.oninput = () => {
      const q = t.closest('.question[data-kind="choice"]');
      if(q && t.value.trim()) q.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
    };
  });
  document.querySelectorAll('.question[data-kind="choice"] input[type="radio"]').forEach(r =>
    r.onchange = () => {
      // picking an option wins over the own-answer field: clear it
      const q = r.closest("[data-question]");
      const own = q && q.querySelector("textarea[data-answer]");
      if(own) own.value = "";
      saveAnswer(q.getAttribute("data-question"), r.value);
    });
  document.querySelectorAll("[data-demo-select]").forEach(r =>
    r.onchange = () => saveAnswer(r.getAttribute("data-demo-select"), r.value));
  document.querySelectorAll("button.v-comment-send[data-comment-variant]").forEach(b =>
    b.onclick = (e) => { e.preventDefault(); e.stopPropagation();
      const vid = b.getAttribute("data-comment-variant");
      const ta = document.querySelector(`textarea[data-comment-variant="${cssesc(vid)}"]`);
      saveVariantComment(vid, ta ? ta.value : "", ta); });
  document.querySelectorAll("textarea[data-comment-variant]").forEach(ta =>
    ta.onkeydown = (e) => {
      if(e.key === "Enter" && (e.metaKey || e.ctrlKey)){ e.preventDefault();
        saveVariantComment(ta.getAttribute("data-comment-variant"), ta.value, ta); }
    });
  // click a comment's quote -> scroll to & flash its highlight in the prose
  document.querySelectorAll(".cmt-quote[data-cid]").forEach(q =>
    q.onclick = () => flashTo(`mark.commented[data-cid="${cssesc(q.getAttribute("data-cid"))}"]`));
}
function cssesc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g,'\\"'); }
function flashTo(sel){
  const el = document.querySelector(sel);

  el.scrollIntoView({ behavior:"smooth", block:"center" });
  el.classList.add("flash"); setTimeout(() => el.classList.remove("flash"), 1100);
}

// ----- inline highlight of the human's left comments -----
function highlightComments(){
  document.querySelectorAll("#content [data-anchor]").forEach(reg => {
    const anchor = reg.getAttribute("data-anchor");
    const comments = draftItems.filter(i => i.blockId === anchor && i.selectedText);
    const body = reg.querySelector(".md");
    if(comments.length && body) applyHighlights(body, comments);
  });
  document.querySelectorAll("mark.commented[data-cid]").forEach(m =>
    m.onclick = () => flashTo(`.cmt[data-cid="${cssesc(m.getAttribute("data-cid"))}"]`));
}
function applyHighlights(container, comments){
  const full = container.textContent;
  const ranges = [], used = [];
  for(const c of comments){
    let from = 0, idx;
    while((idx = full.indexOf(c.selectedText, from)) !== -1){
      const end = idx + c.selectedText.length;
      if(!used.some(u => idx < u.end && end > u.start)){ ranges.push({ start: idx, end, cid: c.id }); used.push({ start: idx, end }); break; }
      from = idx + 1;
    }
  }
  // wrap from the last offset to the first so earlier offsets stay valid
  ranges.sort((a,b) => b.start - a.start).forEach(r => wrapRange(container, r.start, r.end, r.cid));
}
function wrapRange(container, start, end, cid){
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  let pos = 0, node; const edits = [];
  while((node = walker.nextNode())){
    const nodeStart = pos, nodeEnd = pos + node.nodeValue.length; pos = nodeEnd;
    if(nodeEnd <= start || nodeStart >= end) continue;
    edits.push({ node, s: Math.max(start, nodeStart) - nodeStart, e: Math.min(end, nodeEnd) - nodeStart });
  }
  // wrap each text-node slice; reverse keeps offsets valid if two slices share a node
  edits.reverse().forEach(ed => {
    try {
      const range = document.createRange();
      range.setStart(ed.node, ed.s); range.setEnd(ed.node, ed.e);
      const mark = document.createElement("mark");
      mark.className = "commented"; mark.setAttribute("data-cid", cid);
      range.surroundContents(mark);
    } catch(e){ /* skip fragments that can't be wrapped cleanly */ }
  });
}

const pop = $("#sel-popover"), popInput = $("#sel-input");
let selTarget = null;
function anchorOf(node){ const el = node && (node.nodeType === 1 ? node : node.parentElement); return el ? el.closest("[data-anchor]") : null; }
function hidePopover(){ pop.classList.remove("open"); selTarget = null; popInput.value = ""; }
function onSelect(e){
  if(pop.contains(e.target)) return;            // interacting with the input itself
  const content = $("#content");
  const sel = window.getSelection();
  const text = sel && sel.rangeCount ? sel.toString().trim() : "";
  const a1 = text ? anchorOf(sel.anchorNode) : null;
  const a2 = text ? anchorOf(sel.focusNode) : null;
  if(text && a1 && a1 === a2 && content.contains(a1) && !content.hidden){
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    pop.style.top = (window.scrollY + rect.bottom + 8) + "px";
    pop.style.left = (window.scrollX + Math.max(8, rect.left)) + "px";
    pop.classList.add("open");
    selTarget = { anchor: a1.getAttribute("data-anchor"), text };
    popInput.focus();
  } else if(!pop.contains(document.activeElement)){ hidePopover(); }
}
document.addEventListener("mouseup", onSelect);
document.addEventListener("keyup", e => { if(e.key !== "Escape" && !pop.contains(e.target)) onSelect(e); });
popInput.addEventListener("keydown", e => {
  if(e.key === "Escape"){ e.preventDefault(); hidePopover(); }

});

let lastChanges = {}, lastReviews = {};
function renderChanges(ch, rv){

  const files = ch.files || [];

  if(ch.notGit){

  }
  // toggle "только tracked / все": untracked === true means new 0-byte/untracked noise.

  const visible = changesShowAll ? files : files.filter(f => f.untracked !== true);

  const tree = buildFileTree(visible);

  const head = `<div class="changes-head">

    renderChanges(lastChanges, lastReviews);
  });
  $("#changes").querySelectorAll(".floc").forEach(el => el.onclick = () => { const f = el.dataset.f; if(f) selectFile(f); });
}

// b4: build a {name,path,type,children,status,added,removed,untracked} tree from the flat files list.
// Dirs sort above files; names alphabetically. Same node shape as the knowledge tree.
function buildFileTree(files){
  const root = { name: "", path: "", type: "dir", children: [] };
  for(const f of (files || [])){
    const parts = String(f.path || "").split("/").filter(Boolean);
    let node = root;
    let acc = "";
    for(let i = 0; i < parts.length; i++){
      const seg = parts[i];
      acc = acc ? acc + "/" + seg : seg;
      const isFile = i === parts.length - 1;
      if(isFile){
        node.children.push({ name: seg, path: f.path, type: "file",
          status: f.status, added: f.added, removed: f.removed, untracked: f.untracked });
      } else {
        let dir = node.children.find(c => c.type === "dir" && c.name === seg);
        if(!dir){ dir = { name: seg, path: acc, type: "dir", children: [] }; node.children.push(dir); }
        node = dir;
      }
    }
  }
  const sortRec = nd => {
    nd.children.sort((a, b) =>
      (a.type === b.type) ? a.name.localeCompare(b.name) : (a.type === "dir" ? -1 : 1));
    nd.children.forEach(c => c.type === "dir" && sortRec(c));
  };
  sortRec(root);
  return root;
}

// b5: render a change-tree node (dirs collapsible, files selectable) — modeled on renderTree.
function renderChangeTree(node, depth){
  if(!node) return "";
  if(node.type === "dir"){
    const collapsed = changesCollapsed.has(node.path);
    const kids = (node.children || []).map(c => renderChangeTree(c, depth+1)).join("");
    const head = `<div class="tnode dir ${collapsed?'collapsed':''}" data-path="${esc(node.path)}"><span class="caret">▾</span><span class="tlabel">${esc(node.name)}/</span></div>`;
    return head + `<div class="tchildren ${collapsed?'hidden':''}">${kids}</div>`;
  }
  const a = node.added==null ? "" : `<span class="add">+${node.added}</span>`;
  const d = node.removed==null ? "" : ` <span class="del">−${node.removed}</span>`;
  return `<div class="tnode file ${selectedFile===node.path?'active':''}" data-path="${esc(node.path)}" title="${esc(node.path)}">
    <span class="dot ${esc(node.status||'')}" title="${esc(node.status||'')}"></span>
    <span class="tlabel">${esc(node.name)}</span>
    <span class="mini">${a}${d}</span></div>`;
}

// b5: collapse/expand a directory; persist state so polling re-renders don't reset it.
function toggleChangeDir(el){
  const path = el.dataset.path;
  if(changesCollapsed.has(path)) changesCollapsed.delete(path);
  else changesCollapsed.add(path);
  el.classList.toggle("collapsed");
  const kids = el.nextElementSibling;
  if(kids && kids.classList.contains("tchildren")) kids.classList.toggle("hidden");
}

function statLetter(s){ return {added:"A",modified:"M",deleted:"D",renamed:"R"}[s] || "•"; }

// b8: render a unified diff with line-number gutter + sign column, syntax-highlighting code lines.
function renderDiff(text, lang){
  if(!text) return `<pre><span class="dl meta">— нет содержимого diff —</span></pre>`;
  let oldLn = 0, newLn = 0;
  const rows = String(text).split("\n").map(ln => {
    // meta / hunk lines are never highlighted
    if(ln.startsWith("@@")){
      const m = /@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/.exec(ln);
      if(m){ oldLn = parseInt(m[1], 10); newLn = parseInt(m[2], 10); }
      return `<span class="dl hunk">${esc(ln)||"&nbsp;"}</span>`;
    }
    if(ln.startsWith("+++") || ln.startsWith("---") || ln.startsWith("diff ") || ln.startsWith("index ") || ln.startsWith("new file") || ln.startsWith("deleted file") || ln.startsWith("\\ No newline")){
      return `<span class="dl meta">${esc(ln)||"&nbsp;"}</span>`;
    }
    // code lines: strip the leading +/-/space prefix, highlight the body, then reassemble.
    let cls = "", sign = " ", num = "";
    const pfx = ln.charAt(0);
    let body = ln;
    if(pfx === "+"){ cls = "add"; sign = "+"; body = ln.slice(1); num = newLn ? String(newLn++) : ""; }
    else if(pfx === "-"){ cls = "del"; sign = "−"; body = ln.slice(1); num = oldLn ? String(oldLn++) : ""; }
    else { body = ln.startsWith(" ") ? ln.slice(1) : ln; num = newLn ? String(newLn++) : ""; if(oldLn) oldLn++; }
    const code = highlightCode(body, lang) || "&nbsp;";
    return `<span class="dl ${cls}"><span class="ln">${num}</span><span class="sg">${sign==="+"||sign==="−"?sign:"&nbsp;"}</span><span class="code">${code}</span></span>`;
  }).join("");
  return `<pre>${rows}</pre>`;
}

function renderReviews(rv){
  const runs = (rv && rv.runs) || [];
  const btns = `<div class="review-bar">
    <button class="ghost" id="btn-codereview">Запустить code-review</button>
    <button class="ghost" id="btn-secreview">Запустить security-review</button>
    <span class="muted" style="font-size:12px">Агент запустит проверку на ближайшем чекпоинте</span>
  </div>`;
  let body;
  if(!runs.length){
    body = btns + `<p class="empty">Прогонов ревью ещё нет. Они появляются автоматически в фазе VERIFY или по кнопке.</p>`;
  } else {
    const cards = runs.slice().reverse().map(run => {
      const findings = (run.findings || []).map(f =>
        `<div class="finding"><span class="sev ${esc(f.severity||'low')}">${esc((f.severity||'low').toUpperCase())}</span>
          ${f.file?`<span class="floc" data-f="${esc(f.file)}">${esc(f.file)}${f.line?":"+f.line:""}</span>`:""}
          <span>${esc(f.text||"")}</span></div>`).join("");
      return `<div class="run">
        <div class="run-head">
          <span class="run-kind">${esc(run.kind||"review")}</span>
          <span class="run-status ${esc(run.status||'done')}">${statusLabel(run.status)}</span>
          ${run.ts?`<span class="muted" style="font-size:11px">${esc(run.ts)}</span>`:""}
        </div>
        ${run.summary?`<div class="md" style="font-size:13px">${md(run.summary)}</div>`:""}
        ${findings}
      </div>`;
    }).join("");
    body = btns + cards;
  }
  return card("Ревью кода и безопасности", body);
}
function statusLabel(s){ return {running:"выполняется",done:"готово",failed:"ошибка"}[s] || s || "готово"; }

async function triggerReview(kind){
  await api("/signal", { method:"POST", body: JSON.stringify({ slug:SLUG, signal:"run-"+kind }) });
  toast("Запрошен " + kind + " — агент запустит на чекпоинте");
}
// delegated handlers for review buttons (re-rendered each tick)
$("#changes").addEventListener("click", e => {
  if(e.target.id === "btn-codereview") triggerReview("code-review");
  if(e.target.id === "btn-secreview") triggerReview("security-review");

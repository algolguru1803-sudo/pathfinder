// ----- live action feed (incremental, delta-only) -----
// feedModel: Map spanId -> { spanId, tool, arg, role, lane, ok, startTs, endTs, running, order, kind, server, mcpTool }
let feedModel = new Map(), lastFeedOffset = 0, feedOrder = 0;
let expandedAgents = new Set();           // lane keys with their section open
let expandedSpans = new Set();            // lane keys whose "messages" block is open
let feedMsgs = new Map();                 // lane key -> { messages, pending, loading }

// ----- post-mortem agent cards (#trace-summary): expandable, lazy actions + messages -----
// All UI state lives in these Sets/Maps (NOT in the DOM) so the 4s tick re-render of
// #trace-summary never resets an open card / loaded actions / scroll. Keyed by agent spanId.
let expandedCards = new Set();            // spanId of cards whose body is open
let expandedCardActions = new Set();      // spanId whose "Действия" sub-section is open
let expandedCardMsgs = new Set();         // spanId whose "Сообщения агента" sub-section is open
let cardActions = new Map();              // spanId -> { actions, counts, description, pending, loading }
let cardMsgs = new Map();                 // spanId -> { messages, pending, loading }
let cardActionLimit = new Map();          // spanId -> how many actions to show (grows via "показать ещё")
const CARD_ACTIONS_STEP = 40;             // initial + per-click page size

function applyFeedEvents(events){
  (events || []).forEach(ev => {
    const id = ev.spanId; if(!id) return;
    let m = feedModel.get(id);
    if(!m){ m = { spanId:id, order:feedOrder++ }; feedModel.set(id, m); }
    // best-effort attribution: keep the more specific lane we have seen
    if(ev.tool != null) m.tool = ev.tool;
    if(ev.arg != null && ev.arg !== "") m.arg = ev.arg;
    // MCP/type metadata (only on tool.start; carry forward if present)
    if(ev.kind != null) m.kind = ev.kind;
    if(ev.server != null) m.server = ev.server;
    if(ev.mcpTool != null) m.mcpTool = ev.mcpTool;
    if(ev.role != null) m.role = ev.role;
    if(ev.lane != null && (m.lane == null || (m.lane === "orchestrator" && ev.lane !== "orchestrator"))) m.lane = ev.lane;
    if(ev.session_id != null) m.session = ev.session_id;
    if(ev.event === "start"){ if(m.startTs == null) m.startTs = ev.ts; if(m.endTs == null) m.running = true; }
    else if(ev.event === "end"){ m.endTs = ev.ts; m.running = false; if(ev.ok != null) m.ok = ev.ok; }
  });
}

async function traceTick(){
  try {
    const [tr, feed] = await Promise.all([
      api("/trace?slug=" + encodeURIComponent(SLUG)),
      api("/trace/feed?slug=" + encodeURIComponent(SLUG) + "&since=" + lastFeedOffset),
    ]);
    if(feed && Array.isArray(feed.events)){
      applyFeedEvents(feed.events);
      if(typeof feed.nextOffset === "number") lastFeedOffset = feed.nextOffset;
    }
    renderTrace(tr || {});
    renderFeed();
    // retry message blocks that were open but the transcript was not ready yet
    expandedSpans.forEach(key => {
      const st = feedMsgs.get(key);
      if(st && !st.loading && st.pending){ feedMsgs.delete(key); loadFeedMessages(key); }
    });
    // retry open post-mortem card sub-sections whose transcript was not ready yet
    expandedCardActions.forEach(span => {
      const st = cardActions.get(span);
      if(st && !st.loading && st.pending){ cardActions.delete(span); loadCardActions(span, cardSession(span)); }
    });
    expandedCardMsgs.forEach(span => {
      const st = cardMsgs.get(span);
      if(st && !st.loading && st.pending){ cardMsgs.delete(span); loadCardMessages(span, cardSession(span)); }
    });
  } catch(e){ /* server may be restarting */ }
}

// Build lane groups from the incremental feed model. A lane key is the subagent
// spanId (preferred) or "orchestrator"/session for top-level actions.
function feedLanes(){
  const lanes = new Map();   // key -> { key, label, role, actions[], firstTs, running, count }
  feedModel.forEach(m => {
    const key = (m.lane && m.lane !== "orchestrator") ? m.lane : "orchestrator";
    let g = lanes.get(key);
    if(!g){ g = { key, role: null, actions: [], running: false, count: 0, session: m.session }; lanes.set(key, g); }
    if(m.role && key !== "orchestrator") g.role = m.role;
    g.actions.push(m);
    g.count++;
    if(m.running) g.running = true;
  });
  lanes.forEach(g => {
    g.actions.sort((a,b) => (ep(a.startTs)||0) - (ep(b.startTs)||0) || a.order - b.order);
    g.firstTs = g.actions.length ? ep(g.actions[0].startTs) : null;
    g.label = g.key === "orchestrator" ? "оркестратор" : (g.role || g.key);
  });
  // orchestrator last, agents ordered by first activity
  return [...lanes.values()].sort((a,b) => {
    if(a.key === "orchestrator") return 1; if(b.key === "orchestrator") return -1;
    return (a.firstTs||0) - (b.firstTs||0);
  });
}

// Classify an action by its kind/tool name into one of tool|bash|mcp|hook|subtask.
// `kind` (from tool.start) is authoritative when present; otherwise infer from the tool name.
function actType(kind, tool){
  if(kind === "mcp" || kind === "bash" || kind === "tool" || kind === "hook" || kind === "subtask") return kind;
  const t = tool || "";
  if(t.startsWith("mcp__")) return "mcp";
  if(t === "Bash") return "bash";
  if(t === "Task" || t === "Agent") return "subtask";
  return "tool";
}
// Human display name for an action. MCP collapses the long mcp__server__tool to "server · tool".
function actName(m, type){
  if(type === "mcp"){
    if(m.server || m.mcpTool) return (m.server || "?") + " · " + (m.mcpTool || "?");
    const body = (m.tool || "").startsWith("mcp__") ? m.tool.slice(5) : (m.tool || "");
    const i = body.indexOf("__");
    return i >= 0 ? body.slice(0,i) + " · " + body.slice(i+2) : (body || "mcp");
  }
  return m.tool || m.name || "—";
}

function feedActionRow(m, t0){
  const type = actType(m.kind, m.tool);
  const name = actName(m, type);
  const rel = (m.startTs != null && t0 != null) ? Math.max(0, (ep(m.startTs)||0) - t0) : null;
  const tcell = rel == null ? "" : fmtDur(rel);
  const dur = m.running
    ? `<span class="feed-dur run">идёт…</span>`
    : `<span class="feed-dur">${fmtDur(m.startTs!=null&&m.endTs!=null ? (ep(m.endTs)-ep(m.startTs)) : null)}</span>`;
  const cls = (m.running ? "running" : (m.ok === false ? "err" : "")) + " " + type;
  return `<div class="feed-row ${cls}" data-span="${esc(m.spanId)}">
    <div class="feed-line">
      <span class="feed-t">${esc(tcell)}</span>
      <span class="feed-tool ${esc(type)}">${esc(name)}</span>
      ${m.arg ? `<span class="feed-arg">${esc(m.arg)}</span>` : ""}
      ${dur}
    </div>
  </div>`;
}

function feedAgentSection(g){
  const open = expandedAgents.has(g.key);
  const t0 = g.firstTs;
  const rows = g.actions.map(m => feedActionRow(m, t0)).join("");
  const color = roleColor(g.label);
  const sub = g.key === "orchestrator"
    ? (g.session ? `сессия ${esc(String(g.session).slice(0,8))}` : "")
    : "";
  const meta = `${g.count} ${g.count===1?"действие":"действий"}${g.running?" · идёт":""}`;
  const msgOpen = expandedSpans.has(g.key);
  const md_state = feedMsgs.get(g.key);
  let msgBlock = "";
  if(msgOpen){
    if(!md_state || md_state.loading){ msgBlock = `<div class="feed-empty">сообщения загружаются…</div>`; }
    else if(md_state.pending){ msgBlock = `<div class="feed-empty">сообщения ещё подгружаются…</div>`; }
    else if(!md_state.messages || !md_state.messages.length){ msgBlock = `<div class="feed-empty">сообщений нет.</div>`; }
    else {
      msgBlock = `<div class="feed-msgs">` + md_state.messages.map(msg =>
        `<div class="feed-msg"><span class="feed-t">+${esc(fmtDur(msg.relMs))}</span><div class="md">${md(msg.text||"")}</div></div>`
      ).join("") + `</div>`;
    }
  }
  return `<div class="feed-agent ${g.running?"running":""} ${open?"open":""}" data-lane="${esc(g.key)}">
    <div class="feed-agent-head">
      <span class="feed-caret">▸</span>
      <span class="feed-role" style="background:${color}">${esc(g.label)}</span>
      ${sub?`<span class="feed-sub">${sub}</span>`:""}
      <span class="feed-agent-meta">${esc(meta)}</span>
    </div>
    <div class="feed-body">
      <div class="feed-timeline">${rows || `<div class="feed-empty">нет действий</div>`}</div>
      <div class="feed-msgbtn ${msgOpen?"open":""}"><span class="feed-mcaret">▸</span>Сообщения агента</div>
      ${msgBlock}
    </div>
  </div>`;
}

// Diff-render the feed into #trace-feed (a node separate from #trace-summary, so the
// summary/gantt/subagent cards are never touched). Rewrites the feed subtree only when
// the model or expansion state actually changed (signature guard) — ticks with no new
// events are DOM no-ops, so scroll and open sections are preserved. Expansion lives in
// expandedAgents/expandedSpans Sets + feedMsgs Map, so it survives any rebuild.
let lastFeedSig = "";
function renderFeed(){
  const { feed } = ensureTraceShell();
  const lanes = feedLanes();
  if(!lanes.length){
    if(feed.dataset.empty !== "1"){
      feed.innerHTML = card("Живая лента действий", `<p class="empty">Пока нет действий — лента наполнится, когда агенты начнут вызывать инструменты.</p>`);
      feed.dataset.empty = "1"; lastFeedSig = "";
    }
    return;
  }
  // cheap signature: lanes + per-action end/running state + which sections/messages are open
  const sig = lanes.map(g =>
    g.key + ":" + g.actions.map(m => m.spanId + (m.running?"r":"") + (m.ok===false?"x":"") + (m.endTs?"e":"")).join(",") +
    (expandedAgents.has(g.key)?"|A":"") + (expandedSpans.has(g.key)?"|M":"")
  ).join(";") + "#" + [...feedMsgs.keys()].map(k => k + (feedMsgs.get(k).loading?"L":"") + (feedMsgs.get(k).pending?"P":"") + ((feedMsgs.get(k).messages||[]).length)).join(",");
  if(sig === lastFeedSig && feed.dataset.empty === "0") return;
  lastFeedSig = sig;
  feed.dataset.empty = "0";
  const live = `<span class="feed-live"><span class="feed-dot"></span>в реальном времени</span>`;
  const sections = lanes.map(feedAgentSection).join("");
  feed.innerHTML = `<section class="card">${live}<h2>Живая лента действий</h2>${sections}</section>`;
}

// Lazily load agent messages for a lane (spanId or "orchestrator"/role).
async function loadFeedMessages(laneKey){
  const cur = feedMsgs.get(laneKey);
  // re-fetch if still pending (transcript not ready yet); skip if loaded or in-flight
  if(cur && (cur.loading || (cur.messages && cur.messages.length) || (cur.messages && !cur.pending))) return;
  feedMsgs.set(laneKey, { loading: true });
  renderFeed();
  try {
    const r = await api("/trace/messages?slug=" + encodeURIComponent(SLUG) + "&agent=" + encodeURIComponent(laneKey));
    feedMsgs.set(laneKey, { loading: false, pending: !!(r && r.pending), messages: (r && r.messages) || [] });
  } catch(e){
    feedMsgs.set(laneKey, { loading: false, pending: true, messages: [] });
  }
  renderFeed();
}

// Lazily load the per-agent action list for a post-mortem card (by spanId + session).
// Same pending-retry contract as loadFeedMessages: re-fetch while the transcript is not ready.
async function loadCardActions(spanId, session){
  const cur = cardActions.get(spanId);
  if(cur && (cur.loading || (cur.actions && !cur.pending))) return;
  cardActions.set(spanId, { loading: true });
  renderTraceSummary();
  try {
    const r = await api("/trace/actions?slug=" + encodeURIComponent(SLUG)
      + "&agent=" + encodeURIComponent(spanId)
      + "&session=" + encodeURIComponent(session || ""));
    cardActions.set(spanId, {
      loading: false,
      pending: !!(r && r.pending),
      actions: (r && r.actions) || [],
      counts: (r && r.counts) || {},
      description: r ? r.description : null,
    });
  } catch(e){
    cardActions.set(spanId, { loading: false, pending: true, actions: [], counts: {}, description: null });
  }
  renderTraceSummary();
}

// Lazily load agent messages for a post-mortem card (reuses the live-feed /trace/messages contract).
async function loadCardMessages(spanId, session){
  const cur = cardMsgs.get(spanId);
  if(cur && (cur.loading || (cur.messages && !cur.pending))) return;
  cardMsgs.set(spanId, { loading: true });
  renderTraceSummary();
  try {
    const r = await api("/trace/messages?slug=" + encodeURIComponent(SLUG)
      + "&agent=" + encodeURIComponent(spanId)
      + "&session=" + encodeURIComponent(session || ""));
    cardMsgs.set(spanId, { loading: false, pending: !!(r && r.pending), messages: (r && r.messages) || [] });
  } catch(e){
    cardMsgs.set(spanId, { loading: false, pending: true, messages: [] });
  }
  renderTraceSummary();
}

// Delegated handler — the feed is re-rendered each tick, so bind once on #trace.
$("#trace").addEventListener("click", e => {
  // --- post-mortem card branches (#trace-summary) ---
  // "показать ещё" inside a card's actions list — bump the per-card limit
  const more = e.target.closest("[data-card-more]");
  if(more){
    const sp = more.dataset.cardMore;
    cardActionLimit.set(sp, (cardActionLimit.get(sp) || CARD_ACTIONS_STEP) + CARD_ACTIONS_STEP);
    renderTraceSummary();
    return;
  }
  // toggle the "Действия" sub-section (lazy-load on open)
  const actBtn = e.target.closest("[data-card-actions]");
  if(actBtn){
    const sp = actBtn.dataset.cardActions;
    if(expandedCardActions.has(sp)){ expandedCardActions.delete(sp); renderTraceSummary(); }
    else { expandedCardActions.add(sp); loadCardActions(sp, cardSession(sp)); }
    return;
  }
  // toggle the "Сообщения агента" sub-section (lazy-load on open)
  const cmsgBtn = e.target.closest("[data-card-msgs]");
  if(cmsgBtn){
    const sp = cmsgBtn.dataset.cardMsgs;
    if(expandedCardMsgs.has(sp)){ expandedCardMsgs.delete(sp); renderTraceSummary(); }
    else { expandedCardMsgs.add(sp); loadCardMessages(sp, cardSession(sp)); }
    return;
  }
  // toggle the whole card body (clicking the head)
  const cardHead = e.target.closest("[data-card]");
  if(cardHead){
    const sp = cardHead.dataset.card;
    if(expandedCards.has(sp)) expandedCards.delete(sp); else expandedCards.add(sp);
    renderTraceSummary();
    return;
  }
  // --- live feed branches (#trace-feed) ---
  const head = e.target.closest(".feed-agent-head");
  if(head){
    const key = head.parentElement.dataset.lane;
    if(expandedAgents.has(key)) expandedAgents.delete(key); else expandedAgents.add(key);
    renderFeed();
    return;
  }
  const msgbtn = e.target.closest(".feed-msgbtn");
  if(msgbtn){
    const key = msgbtn.closest(".feed-agent").dataset.lane;
    if(expandedSpans.has(key)){ expandedSpans.delete(key); renderFeed(); }
    else { expandedSpans.add(key); loadFeedMessages(key); }
  }
});

function fmtTok(n){ if(n==null) return "—"; if(n<1000) return ""+n; if(n<1e6) return (n/1000).toFixed(n<10000?1:0)+"k"; return (n/1e6).toFixed(2)+"M"; }
function fmtDur(ms){ if(ms==null) return "—"; const s=Math.round(ms/1000); if(s<60) return s+"s"; const m=Math.floor(s/60), r=s%60; return r?`${m}м ${r}с`:`${m}м`; }
// fmtDur c часами — для оси/тултипа таймлайна на длинных прогонах (fmtDur часы не умеет).
function fmtDurH(ms){ if(ms==null) return "—"; let s=Math.round(ms/1000); const h=Math.floor(s/3600); s-=h*3600; const m=Math.floor(s/60); s-=m*60;
  if(h) return m?`${h}ч ${m}м`:`${h}ч`; if(m) return s?`${m}м ${s}с`:`${m}м`; return s+"с"; }
function fmtUsd(v){ if(v==null) return "—"; return "≈$"+(v<0.01?v.toFixed(4):v.toFixed(2)); }
function fmtPct(v){ return v==null?"—":v+"%"; }
function clock(ts){ const d=new Date(ts); return String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0"); }
// «Красивый» шаг делений оси (~target тиков) — минуты/часы.
function tickStepMs(spanMs, target){ const raw=spanMs/target; const c=[60e3,120e3,300e3,600e3,900e3,1800e3,3600e3,7200e3,14400e3]; for(const x of c) if(x>=raw) return x; return c[c.length-1]; }
// Роль приходит с namespace-префиксом (ai-pathfinder:wf-coder) — нормализуем до ключа палитры (coder).
function roleKey(r){ return (r||"").split(":").pop().replace(/^wf-/,""); }
function roleLabel(r){ const k=roleKey(r); return k==="general-purpose"?"general":k; }
const ROLE_COLORS = {
  explorer:"#0ea5e9", planner:"#8b5cf6", coder:"#10b981", reviewer:"#f59e0b",
  documenter:"#ec4899", "оркестратор":"#64748b", Explore:"#06b6d4", "general-purpose":"#64748b"
};
function roleColor(r){ const k=roleKey(r); if(ROLE_COLORS[k]) return ROLE_COLORS[k];
  let h=0; for(const c of k) h=(h*31+c.charCodeAt(0))%360; return `hsl(${h} 58% 46%)`; }
// Метаданные фаз (фон-регионы). PHASE_NONE — легитимный бакет «вне фазы» (phase=null).
const PHASE_NONE = "—";
const PHASE_META = {
  EXPLORE:   {label:"EXPLORE",   bg:"var(--ph-explore)",   line:"var(--ph-explore-line)"},
  ELABORATE: {label:"ELABORATE", bg:"var(--ph-elaborate)", line:"var(--ph-elaborate-line)"},
  IMPLEMENT: {label:"IMPLEMENT", bg:"var(--ph-implement)", line:"var(--ph-implement-line)"},
  VERIFY:    {label:"VERIFY",    bg:"var(--ph-verify)",    line:"var(--ph-verify-line)"},
  [PHASE_NONE]: {label:"вне фазы", bg:"var(--ph-none)",    line:"var(--ph-none-line)"},
};
const PHASE_ORDER = ["EXPLORE","ELABORATE","IMPLEMENT","VERIFY",PHASE_NONE];
function ep(ts){ const v = Date.parse(ts||""); return isNaN(v)?null:v; }

// Ensure #trace has stable child containers so the live feed (#trace-feed) and the
// interactive timeline (#trace-gantt) are never clobbered by the summary re-render.
// The feed is diff-rendered separately; the gantt holds its own brush/tooltip state
// outside #trace-summary, so the 4s summary tick can't reset the selected window.
function ensureTraceShell(){
  let feed = $("#trace-feed");
  if(!feed){
    $("#trace").innerHTML = `<div id="trace-feed"></div><div id="trace-gantt"></div><div id="trace-summary"></div>`;
    feed = $("#trace-feed");
  }
  return { feed, gantt: $("#trace-gantt"), summary: $("#trace-summary") };
}

// renderTrace caches the latest /trace model, then diff-renders via renderTraceSummary().
// Splitting the fetch from the render lets lazy card loaders re-render the summary without a
// fresh /trace round-trip, and keeps the tick's DOM write behind a cheap signature guard.
let lastTrace = {}, lastTraceSig = "";
function renderTrace(tr){ lastTrace = tr || {}; renderTraceSummary(); }

// Resolve an agent's session from the cached /trace model (used by pending-retry loaders).
function cardSession(spanId){
  const a = (lastTrace.agents || []).find(x => x.spanId === spanId);
  return a ? a.session_id : "";
}

function renderTraceSummary(){
  const { gantt, summary } = ensureTraceShell();
  const tr = lastTrace;
  const agents = tr.agents || [];
  if(!agents.length){
    if(summary.dataset.empty !== "1"){ summary.innerHTML = `<p class="empty">Пока нет данных трейсинга — сводка появится, когда отработают сабагенты.</p>`; summary.dataset.empty = "1"; gantt.innerHTML = ""; gantt.dataset.sig = ""; lastTraceSig = ""; }
    return;
  }
  const subs = agents.filter(a => a.kind === "subagent");
  const orch = agents.filter(a => a.kind === "orchestrator");
  const T = tr.totals || {};

  // Таймлайн рендерится в стабильный контейнер вне #trace-summary, поэтому его
  // brush-окно/тултип не сбрасываются 4-секундным тиком summary. Перерисовка — только
  // по своей сигнатуре (смена набора/таймингов интервалов), не по каждому тику.
  renderGantt(gantt, subs, tr);

  // Cheap signature: anything that changes the rendered summary must appear here, or a tick
  // would skip the DOM write (good — preserves open cards/scroll) while a click that toggles
  // state would fail to re-render. So include agent identity + summary + every interactive flag.
  const sig = agents.map(a => {
    const sp = a.spanId || "";
    const ca = cardActions.get(sp), cm = cardMsgs.get(sp);
    return sp + "~" + (a.summary||"") + "~" + (a.durationMs||"") + "/" + (a.out||"") + "/" + (a.ok===false?"x":"")
      + (expandedCards.has(sp)?"|C":"")
      + (expandedCardActions.has(sp)?"|A":"") + (expandedCardMsgs.has(sp)?"|M":"")
      + (ca?("a"+(ca.loading?"L":"")+(ca.pending?"P":"")+((ca.actions||[]).length)):"")
      + (cm?("m"+(cm.loading?"L":"")+(cm.pending?"P":"")+((cm.messages||[]).length)):"")
      + "n" + (cardActionLimit.get(sp)||"");
  }).join(";") + "#" + (tr.sessions?tr.sessions.length:0) + "/" + (T.agents||0) + "/" + (T.out||0);
  if(sig === lastTraceSig && summary.dataset.empty === "0") return;
  lastTraceSig = sig;
  summary.dataset.empty = "0";

  // --- summary ---
  const byModel = Object.entries(T.byModel || {})
    .map(([m,d]) => `${esc(m)}: ${fmtTok(d.out)} ток · ${fmtUsd(d.costUsd)} · ${d.agents} аг.`).join(" · ");
  let h = card("Сводка сессии", `
    <div class="stats">
      ${stat(tr.sessions ? tr.sessions.length : 0, "сессий")}
      ${stat(T.agents||0, "сабагентов")}
      ${stat(fmtTok(T.out), "выходных токенов")}
      ${stat(fmtDur(T.durationMs), "общее время")}
      ${stat(fmtTok(T.contextPeak), "пиковый контекст")}
      ${stat(fmtUsd(T.costUsd), "≈ стоимость")}
    </div>${byModel?`<div class="bymodel">${byModel}</div>`:""}`);

  // --- timeline (gantt) renders into its own stable #trace-gantt container above (see renderGantt) ---

  // --- per-agent, grouped by phase, orchestrator first ---
  let body = "";
  orch.forEach(a => body += agentCard(a, tr.window));
  const phases = [];
  subs.forEach(a => { const p = a.phase || "—"; if(!phases.includes(p)) phases.push(p); });
  phases.forEach(p => {
    body += `<div class="phase-h">${esc(p)}</div>`;
    subs.filter(a => (a.phase||"—") === p).forEach(a => body += agentCard(a, tr.window));
  });
  h += card("Сабагенты", body);

  summary.innerHTML = h;
}

// Legend chips counting actions by type (textual/unicode glyphs, no CDN).
const ACT_TYPE_META = {
  tool:    { label: "инструменты", glyph: "🔧", c: "var(--t-tool)" },
  bash:    { label: "bash",        glyph: "⌨",  c: "var(--t-bash)" },
  mcp:     { label: "mcp",         glyph: "🔌", c: "var(--t-mcp)" },
  subtask: { label: "под-задачи",  glyph: "🧩", c: "var(--t-subtask)" },
  hook:    { label: "hooks",       glyph: "⚙",  c: "var(--t-hook)" },
};
function actLegend(counts){
  const chips = ["tool","bash","mcp","subtask","hook"]
    .filter(t => (counts && counts[t]) > 0)
    .map(t => { const meta = ACT_TYPE_META[t];
      return `<span class="lchip"><span class="ldot" style="background:${meta.c}"></span>${meta.glyph} ${counts[t]}</span>`; })
    .join("");
  return chips ? `<div class="legend">${chips}</div>` : "";
}
function actStatusChip(status){
  if(status === "running") return `<span class="run-status running">идёт…</span>`;
  if(status === "error")   return `<span class="run-status failed">err</span>`;
  return `<span class="run-status done">ok</span>`;
}
// One chronological action row inside a post-mortem card (single timeline, colour-typed by type).
function actRow(a){
  const type = ["tool","bash","mcp","subtask","hook"].includes(a.type) ? a.type : "tool";
  const cls = type + (a.status === "running" ? " running" : (a.status === "error" ? " err" : ""));
  const tcell = (typeof a.relMs === "number") ? fmtDur(a.relMs) : "";
  return `<div class="act-row ${cls}">
    <span class="act-t">${esc(tcell)}</span>
    <span class="act-type">${esc(type)}</span>
    <span class="act-name">${esc(a.name || "—")}</span>
    ${a.arg ? `<span class="act-arg">${esc(a.arg)}</span>` : ""}
    <span class="act-status">${actStatusChip(a.status)}</span>
  </div>`;
}
// Render the "Действия" sub-section body for a card (legend + chronological timeline + "показать ещё").
function cardActionsBody(spanId){
  const st = cardActions.get(spanId);
  if(!st || st.loading) return `<div class="feed-empty">действия загружаются…</div>`;
  if(st.pending) return `<div class="feed-empty">действия ещё подгружаются…</div>`;
  const acts = st.actions || [];
  if(!acts.length) return `<div class="feed-empty">действий нет.</div>`;
  const limit = cardActionLimit.get(spanId) || CARD_ACTIONS_STEP;
  const shown = acts.slice(0, limit);
  const rows = shown.map(actRow).join("");
  const rest = acts.length - shown.length;
  const more = rest > 0 ? `<div class="act-more" data-card-more="${esc(spanId)}">показать ещё ${rest > CARD_ACTIONS_STEP ? CARD_ACTIONS_STEP : rest} →</div>` : "";
  return actLegend(st.counts) + `<div class="act-timeline">${rows}</div>` + more;
}
// Render the "Сообщения агента" sub-section body for a card (reuses /trace/messages + md()).
function cardMsgsBody(spanId){
  const st = cardMsgs.get(spanId);
  if(!st || st.loading) return `<div class="feed-empty">сообщения загружаются…</div>`;
  if(st.pending) return `<div class="feed-empty">сообщения ещё подгружаются…</div>`;
  if(!st.messages || !st.messages.length) return `<div class="feed-empty">сообщений нет.</div>`;
  return `<div class="feed-msgs">` + st.messages.map(msg =>
    `<div class="feed-msg"><span class="feed-t">+${esc(fmtDur(msg.relMs))}</span><div class="md">${md(msg.text||"")}</div></div>`
  ).join("") + `</div>`;
}
function stat(v, k){ return `<div class="stat"><div class="v">${esc(String(v))}</div><div class="k">${esc(k)}</div></div>`; }

// ----- Таймлайн «Трейсинг», Вариант C: токен-обзор + фазы + brush + детальная зона -----
// Состояние brush (выбранное окно) и нормализованная модель держатся в МОДУЛЬНЫХ переменных
// вне #trace-summary — поэтому 4-секундный тик не сбрасывает зум/наведение. Каркас перерисовывается
// в стабильный host только при смене данных (по gSig); brush/детальная зона — отрисовкой по событиям.
let gItems = [], gT0 = 0, gT1 = 0, gSpan = 1, gSkipped = 0, gPhases = [], gTokRate = [], gTokMax = 1, gNbuck = 240, gBw = 1;
let gBs = 0, gBe = 0, gHasWin = false;   // выбранное окно brush (по умолчанию — весь прогон)
let gGanttHost = null;

// Главная точка: пересобрать модель из subs/tr, при смене данных — перестроить каркас, иначе перерисовать.
function renderGantt(host, subs, tr){
  gGanttHost = host;
  bindGanttDeleg();   // делегированный hover/click на стабильном #trace-gantt — биндится один раз
  const NOW = Date.now();
  const tl = (tr && tr.timeline) || {};
  // нормализация интервалов: только субагенты с известным startTs; span-/null → в сноску.
  const items = []; let skipped = 0;
  (subs || []).forEach(a => {
    const s = ep(a.startTs); if(s == null){ skipped++; return; }
    let e = ep(a.endTs); let running = false;
    if(e == null){ e = NOW; running = true; }     // endTs нет, но есть start → идёт (бар до now)
    if(e < s) e = s + 1000;
    items.push({ a, s, e, running });
  });
  items.sort((x,y) => x.s - y.s);
  // границы — от серверных t0/t1 (учитывают окно), расширяем running до now и до фактических интервалов.
  const srvT0 = (tl.t0 != null) ? tl.t0*1000 : Infinity;
  const srvT1 = (tl.t1 != null) ? tl.t1*1000 : -Infinity;
  const T0 = Math.min(srvT0, ...items.map(x => x.s));
  const T1 = Math.max(srvT1, ...items.map(x => x.e), items.some(x=>x.running)?NOW:-Infinity);
  const SPAN = Math.max(1, T1 - T0);

  // --- токен-темп во времени (b13): out — итог за интервал, раздаём как rate = out/длительность ---
  const NBUCK = 240, bw = SPAN/NBUCK;
  const tokRate = new Array(NBUCK).fill(0);
  items.forEach(x => {
    const out = x.a.out; if(out == null || out <= 0) return;
    const dur = Math.max(1, x.e - x.s);            // микро-интервал → токены в его бакет (без /0)
    const rate = out / dur;
    const b0 = Math.max(0, Math.floor((x.s - T0)/bw));
    const b1 = Math.min(NBUCK-1, Math.floor((x.e - T0 - 1)/bw));
    for(let b = b0; b <= b1; b++) tokRate[b] += rate;
  });
  const tokMax = Math.max(1e-9, ...tokRate);

  // --- фазовые регионы (b14): диапазон фазы = [min start … max end] её интервалов; нахлёст допускаем ---
  const pm = new Map();
  items.forEach(x => { const p = x.a.phase || PHASE_NONE;
    const r = pm.get(p) || { p, s: Infinity, e: -Infinity, n: 0, out: 0 };
    r.s = Math.min(r.s, x.s); r.e = Math.max(r.e, x.e); r.n++; r.out += (x.a.out||0); pm.set(p, r); });
  const phases = [...pm.values()].sort((a,b) => {
    const ia = PHASE_ORDER.indexOf(a.p), ib = PHASE_ORDER.indexOf(b.p);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });

  // сигнатура каркаса: пересобираем DOM только при смене набора/таймингов (не на каждый тик),
  // иначе brush-окно и наведение сохраняются. running-бары двигают T1 → попадают в сигнатуру.
  const sig = items.map(x => (x.a.spanId||"")+":"+x.s+":"+x.e+":"+(x.a.ok===false?"x":"")+(x.running?"r":""))
                .join("|") + "#" + T0 + "/" + T1 + "/" + skipped;

  // публикуем модель в модульные переменные
  gItems = items; gT0 = T0; gT1 = T1; gSpan = SPAN; gSkipped = skipped;
  gPhases = phases; gTokRate = tokRate; gTokMax = tokMax; gNbuck = NBUCK; gBw = bw;

  if(host.dataset.sig === sig){
    // данные не менялись — каркас на месте; только подгоняем геометрию под текущую ширину
    if(!gHasWin){ gBs = T0; gBe = T1; }
    drawOverview(); drawDetail();
    return;
  }
  host.dataset.sig = sig;
  // окно: сохраняем выбранное, если оно ещё валидно внутри новых границ; иначе — весь прогон.
  if(!gHasWin || gBs < T0 || gBe > T1 || gBe - gBs < 1){ gBs = T0; gBe = T1; gHasWin = false; }

  if(!items.length){
    host.innerHTML = card("Таймлайн · параллелизм сабагентов",
      `<p class="empty">Нет интервалов с известным временем старта.${skipped?` (${skipped} запись без startTs скрыта)`:""}</p>`);
    return;
  }

  // каркас (структура из mockups/v3.html, адаптирована к живому card())
  host.innerHTML = card("Таймлайн · параллелизм сабагентов", `
    <div class="legend g-legend" id="g-legend"></div>
    <div class="legend ph g-legend" id="g-legend-ph"></div>
    <p class="sub" id="g-ovsub"></p>
    <div class="ov" id="g-ov">
      <div class="ov-phases" id="g-ovphases"></div>
      <svg class="ov-svg" id="g-ovsvg" preserveAspectRatio="none"></svg>
      <div class="ov-brush" id="g-brush"></div>
      <div class="ov-axis" id="g-ovaxis"></div>
    </div>
    <p class="ov-hint" id="g-ovhint"></p>
    <div class="det-wrap"><div class="det-inner" id="g-det"></div></div>`);

  bindBrush();
  legendGantt();
  drawOverview();
  drawDetail();
}

// суммарные токены выбранного окна (Σ rate*bw по бакетам ≈ Σ out)
function tokTotalWin(){
  let sum = 0; const b0 = Math.max(0, Math.floor((gBs-gT0)/gBw)), b1 = Math.min(gNbuck-1, Math.floor((gBe-gT0)/gBw));
  for(let b = b0; b <= b1; b++) sum += gTokRate[b]*gBw; return Math.round(sum);
}

function legendGantt(){
  const leg = $("#g-legend", gGanttHost); if(!leg) return;
  const roles = [...new Set(gItems.map(x => roleKey(x.a.role)))];
  leg.innerHTML = `<span class="legtitle">роли</span>`+
    roles.map(k => `<span class="lchip"><span class="ldot" style="background:${ROLE_COLORS[k]||roleColor(k)}"></span>${esc(k==="general-purpose"?"general":k)}</span>`).join("")+
    `<span class="lchip"><span class="ldot run"></span>идёт</span>`+
    `<span class="lchip"><span class="ldot err"></span>ошибка</span>`;
  const legPh = $("#g-legend-ph", gGanttHost);
  legPh.innerHTML = `<span class="legtitle">фазы (фон)</span>`+
    gPhases.map(r => { const m = PHASE_META[r.p] || PHASE_META[PHASE_NONE];
      return `<span class="lchip"><span class="lbar" style="background:${m.bg};border-color:${m.line}"></span>${esc(m.label)} · ${r.n}</span>`; }).join("");
  const totOut = gItems.reduce((s,x) => s+(x.a.out||0), 0);
  const maxN = gPhases.length ? Math.max(...gPhases.map(p => p.n)) : 0;
  $("#g-ovsub", gGanttHost).textContent =
    `Весь прогон: ${clock(gT0)}–${clock(gT1)} UTC · ${gItems.length} интервалов · до ${maxN} аг в крупнейшей фазе · ≈${fmtTok(totOut)} токенов`+
    (gSkipped?` · ${gSkipped} запись без startTs скрыта`:``)+`.`;
}

function drawOverview(){
  const host = gGanttHost; if(!host) return;
  const svg = $("#g-ovsvg", host); if(!svg) return;
  const W = svg.clientWidth || 1100, H = 78;
  const px = t => (t-gT0)/gSpan*W;
  // площадь по токен-темпу (по бакетам)
  let path = `M0,${H} `;
  for(let b = 0; b < gNbuck; b++){
    const x0 = px(gT0+b*gBw), x1 = px(gT0+(b+1)*gBw);
    const y = H-(gTokRate[b]/gTokMax)*(H-8);
    path += `L${x0.toFixed(1)},${y.toFixed(1)} L${x1.toFixed(1)},${y.toFixed(1)} `;
  }
  path += `L${W},${H} Z`;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.innerHTML = `<path d="${path}" fill="var(--accent)" fill-opacity="0.22" stroke="var(--accent)" stroke-width="1.1" stroke-opacity="0.7"/>`;
  // фазовые полосы сверху обзора — greedy-пакинг в под-строки при нахлёсте по времени.
  const ovp = $("#g-ovphases", host); let ph = ""; const rowEnds = [];
  gPhases.forEach(r => { const l = px(r.s), w = Math.max(2, px(r.e)-px(r.s)); const m = PHASE_META[r.p] || PHASE_META[PHASE_NONE];
    let row = rowEnds.findIndex(e => e <= l-2); if(row < 0){ row = rowEnds.length; rowEnds.push(l+w); } else rowEnds[row] = l+w;
    ph += `<div class="ov-phband" style="top:${row*16}px;left:${l}px;width:${w}px;background:${m.bg};border-left-color:${m.line}" title="${esc(m.label)}: ${r.n} аг · ${fmtTok(r.out)} ток">${esc(m.label)}</div>`; });
  const phRows = Math.max(1, rowEnds.length); ovp.style.height = (phRows*16)+"px"; ovp.innerHTML = ph;
  // ось обзора (абсолютное HH:MM UTC) с делениями
  const step = tickStepMs(gSpan, 8); const ax = $("#g-ovaxis", host); let html = "";
  for(let t = Math.ceil(gT0/step)*step; t <= gT1; t += step) html += `<span class="ov-tick" style="left:${px(t)}px">${clock(t)}</span>`;
  ax.innerHTML = html;
  // brush — под полосой фаз, поверх токен-svg
  const b = $("#g-brush", host);
  b.style.top = ovp.offsetHeight+"px"; b.style.height = H+"px";
  b.style.left = px(gBs)+"px"; b.style.width = Math.max(6, px(gBe)-px(gBs))+"px";
  $("#g-ovhint", host).innerHTML =
    `Верх — <b>производство токенов во времени</b> (высота = токены/время, агрегированный темп: для каждого агента rate = out/длительность, суммарно по активным). `+
    `Полосы сверху — <b>фазы workflow</b> (фон = фаза, не цвет бара). Тяните по полосе, чтобы выбрать окно (двойной клик — весь прогон). `+
    `В окне ≈ <b>${fmtTok(tokTotalWin())}</b> токенов.`;
}

function drawDetail(){
  const host = gGanttHost; if(!host) return;
  const det = $("#g-det", host); if(!det) return;
  const win = gItems.filter(x => x.e >= gBs && x.s <= gBe);
  if(!win.length){ det.style.width = ""; det.innerHTML = `<div class="det-empty">В выбранном окне нет интервалов.</div>`; return; }
  const w0 = gBs, w1 = gBe, wspan = Math.max(1, w1-w0);
  const wrap = host.querySelector(".det-wrap");
  const Wd = Math.max(640, (wrap ? wrap.clientWidth : 1100)-2);
  det.style.width = Wd+"px";
  const px = t => (Math.max(w0, Math.min(w1, t))-w0)/wspan*Wd;
  // lane-packing внутри окна
  const arr = win.slice().sort((a,b) => a.s-b.s); const laneEnds = [];
  arr.forEach(x => { let li = laneEnds.findIndex(e => e <= x.s); if(li < 0){ li = laneEnds.length; laneEnds.push(x.e); } else laneEnds[li] = x.e; x.dl = li; });
  // фоновые регионы фаз (за барами), клип по окну
  let phbg = "";
  gPhases.forEach(r => { const s = Math.max(w0, r.s), e = Math.min(w1, r.e); if(e <= s) return;
    const l = px(s), w = px(e)-px(s); const m = PHASE_META[r.p] || PHASE_META[PHASE_NONE];
    phbg += `<div class="det-phbg" style="left:${l}px;width:${w}px;background:${m.bg}"></div>`; });
  // полоса-заголовки фаз сверху (greedy-пакинг при нахлёсте)
  let phhdr = ""; const hdrEnds = [];
  gPhases.forEach(r => { const s = Math.max(w0, r.s), e = Math.min(w1, r.e); if(e <= s) return;
    const l = px(s), w = Math.max(2, px(e)-px(s)); const m = PHASE_META[r.p] || PHASE_META[PHASE_NONE];
    let row = hdrEnds.findIndex(en => en <= l-2); if(row < 0){ row = hdrEnds.length; hdrEnds.push(l+w); } else hdrEnds[row] = l+w;
    phhdr += `<div class="det-phband" style="top:${row*16}px;left:${l}px;width:${w}px;background:${m.bg};border-left-color:${m.line}">${esc(m.label)}</div>`; });
  const hdrH = Math.max(1, hdrEnds.length)*16;
  const step = tickStepMs(wspan, 7); let axis = "";
  for(let t = Math.ceil(w0/step)*step; t <= w1; t += step) axis += `<span class="det-tick" style="left:${px(t)}px">${clock(t)}</span>`;
  let lanes = "";
  for(let li = 0; li < laneEnds.length; li++){
    let bars = "";
    arr.filter(x => x.dl === li).forEach(x => {
      const a = x.a, c = roleColor(a.role); const l = px(x.s), w = px(x.e)-px(x.s);
      const dur = fmtDurH(a.durationMs != null ? a.durationMs : (x.e-x.s));
      // микро-интервал (<4px) → точка-маркер вместо нулевого бара (b6)
      if(w < 4){ bars += `<div class="det-dot" data-span="${esc(a.spanId)}" style="left:${l}px;background:${c}"></div>`; return; }
      bars += `<div class="det-bar ${a.ok===false?'err':''} ${x.running?'running':''}" data-span="${esc(a.spanId)}" style="left:${l}px;width:${w}px;background:${c}">`+
        (w>60?`<span>${esc(roleLabel(a.role))}</span>`:``)+(w>36?`<span class="du">${esc(dur)}${x.running?' · идёт':''}</span>`:``)+`</div>`;
    });
    lanes += `<div class="det-lane">${bars}</div>`;
  }
  det.innerHTML = `<div class="det-phases" style="height:${hdrH}px">${phhdr}</div><div class="det-axis">${axis}</div>`+
    `<div style="position:relative">${phbg}<div class="det-lanes">${lanes}</div></div>`;
}

// drag-brush по обзору пишет окно gBs/gBe (модульные переменные вне DOM) и перерисовывает зоны.
// window/document-листенеры биндятся один раз; dblclick — на текущий svg при каждой пересборке каркаса.
let gBrushDragging = false, gBrushX0 = 0, gBrushBound = false;
function gTAt(clientX){ const o = gGanttHost && $("#g-ovsvg", gGanttHost); if(!o) return gT0; const r = o.getBoundingClientRect(); const f = (clientX-r.left)/r.width; return gT0+Math.max(0,Math.min(1,f))*gSpan; }
function bindBrush(){
  const ov = $("#g-ovsvg", gGanttHost); if(!ov) return;
  ov.addEventListener("dblclick", () => { gBs = gT0; gBe = gT1; gHasWin = false; drawOverview(); drawDetail(); });
  if(gBrushBound) return; gBrushBound = true;   // глобальные листенеры — один раз, читают gGanttHost/g*
  document.addEventListener("mousedown", e => {
    const o = gGanttHost && $("#g-ovsvg", gGanttHost); if(!o || !o.contains(e.target)) return;
    gBrushDragging = true; gBrushX0 = gTAt(e.clientX); gBs = gBrushX0; gBe = gBrushX0; gHasWin = true; drawOverview();
  });
  window.addEventListener("mousemove", e => { if(!gBrushDragging) return; const t = gTAt(e.clientX); gBs = Math.min(gBrushX0,t); gBe = Math.max(gBrushX0,t); drawOverview(); });
  window.addEventListener("mouseup", () => { if(!gBrushDragging) return; gBrushDragging = false;
    if(gBe-gBs < 60000){ gBs = gT0; gBe = gT1; gHasWin = false; drawOverview(); }    // слишком узко → весь прогон
    drawDetail(); });
  window.addEventListener("resize", () => { if(gGanttHost && gGanttHost.querySelector(".ov-svg")){ drawOverview(); drawDetail(); } });
}

// Тултип бара — отдельный position:fixed-узел в <body> (вне #trace-summary), его не трёт тик summary.
function gTip(){ let t = document.getElementById("g-tip"); if(!t){ t = document.createElement("div"); t.id = "g-tip"; document.body.appendChild(t); } return t; }
// hover + click по таймлайну делегируются на стабильный #trace-gantt — биндим один раз.
let gGanttDelegBound = false;
function bindGanttDeleg(){
  if(gGanttDelegBound) return; gGanttDelegBound = true;
  const root = $("#trace-gantt"); if(!root) return;
  const tip = gTip();
  const findItem = span => gItems.find(x => x.a.spanId === span);
  root.addEventListener("mousemove", e => {
    const el = e.target.closest(".det-bar[data-span], .det-dot[data-span]");
    if(!el){ tip.style.display = "none"; return; }
    const it = findItem(el.dataset.span); if(!it){ tip.style.display = "none"; return; }
    const a = it.a;
    tip.innerHTML = `<div class="h">${esc(roleLabel(a.role))}${a.ok===false?' · ⚠ ошибка':(it.running?' · идёт…':'')}</div>`+
      `<div class="s">${esc(a.summary||"без описания")}</div><div class="kv">`+
      `<span class="k">фаза</span><span class="v">${esc(a.phase||"вне фазы")}</span>`+
      `<span class="k">старт</span><span class="v">${a.startTs?clock(ep(a.startTs))+" UTC":"—"}</span>`+
      `<span class="k">длит.</span><span class="v">${fmtDurH(a.durationMs!=null?a.durationMs:(it.e-it.s))}</span>`+
      `<span class="k">модель</span><span class="v">${esc(a.model||"—")}</span>`+
      `<span class="k">токены</span><span class="v">${fmtTok(a.out)}</span>`+
      `<span class="k">контекст</span><span class="v">${fmtPct(a.contextPct)}</span>`+
      `<span class="k">≈ стоим.</span><span class="v">${fmtUsd(a.costUsd)}</span></div>`;
    tip.style.display = "block";
    let x = e.clientX+14, y = e.clientY+14;
    if(x+340 > innerWidth) x = e.clientX-340; if(y+200 > innerHeight) y = e.clientY-200;
    tip.style.left = Math.max(4,x)+"px"; tip.style.top = Math.max(4,y)+"px";
  });
  root.addEventListener("mouseleave", () => { tip.style.display = "none"; });
  // клик по бару → скролл/подсветка карточки агента ниже по spanId (карточка несёт data-card-span)
  root.addEventListener("click", e => {
    const el = e.target.closest(".det-bar[data-span], .det-dot[data-span]"); if(!el) return;
    const card = document.querySelector(`.agent[data-card-span="${cssesc(el.dataset.span)}"]`); if(!card) return;
    card.scrollIntoView({ behavior:"smooth", block:"center" });
    card.classList.add("flash"); setTimeout(() => card.classList.remove("flash"), 1100);  // снимаем по таймауту, sig не трогаем
  });
}

function agentCard(a, window){
  const ctxPct = a.contextPct != null ? a.contextPct : null;
  const hot = ctxPct != null && ctxPct >= 80;
  const ctx = ctxPct == null ? "" : `
    <div class="metric"><div class="k">контекст окна</div>
      <div class="v">${fmtTok(a.peakContext)} <span class="muted">(${ctxPct}%)</span></div>
      <div class="ctxbar"><div class="${hot?'hot':''}" style="width:${Math.min(100,ctxPct)}%"></div></div></div>`;
  const tags = [
    a.bg ? `<span class="tag bg">фон</span>` : "",
    a.ok === false ? `<span class="tag fail">ошибка</span>` : "",
    !a.hasUsage ? `<span class="tag">нет токенов</span>` : "",
  ].join("");
  const span = a.spanId || "";
  // a span without a tool-use id ("span-" / "") cannot resolve a transcript — keep that card flat
  const expandable = span && span !== "span-";
  const open = expandable && expandedCards.has(span);
  const desc = a.summary
    ? `<span class="agent-desc"><span class="lbl">задача:</span> ${esc(a.summary)}</span>` : "";
  // expandable body: "Действия" (lazy /trace/actions) + "Сообщения агента" (lazy /trace/messages)
  const actOpen = expandedCardActions.has(span);
  const msgOpen = expandedCardMsgs.has(span);
  const body = expandable ? `<div class="agent-body">
      <div class="card-sub">
        <div class="card-subbtn ${actOpen?"open":""}" data-card-actions="${esc(span)}"><span class="card-subcaret">▸</span>Действия</div>
        ${actOpen ? cardActionsBody(span) : ""}
      </div>
      <div class="card-sub">
        <div class="card-subbtn ${msgOpen?"open":""}" data-card-msgs="${esc(span)}"><span class="card-subcaret">▸</span>Сообщения агента</div>
        ${msgOpen ? cardMsgsBody(span) : ""}
      </div>
    </div>` : "";
  return `<div class="agent ${a.kind==='orchestrator'?'orch':''} ${a.ok===false?'err':''} ${open?'open':''}" data-card-span="${esc(span)}">
    <div class="agent-head ${expandable?"clickable":""}" ${expandable?`data-card="${esc(span)}"`:""}>
      ${expandable?`<span class="agent-caret">▸</span>`:""}
      <span class="role" style="background:${roleColor(a.role)}">${esc(a.role||"—")}</span>
      ${a.workstream?`<span class="ws">${esc(a.workstream)}</span>`:""}
      ${a.model?`<span class="tag">${esc(a.model)}</span>`:""}
      ${tags}
      ${desc}
    </div>
    <div class="metrics">
      <div class="metric"><div class="k">время</div><div class="v">${fmtDur(a.durationMs)}</div></div>
      <div class="metric"><div class="k">выход</div><div class="v">${fmtTok(a.out)} ток</div></div>
      <div class="metric"><div class="k">кэш-хит</div><div class="v">${fmtPct(a.cacheHitPct)}</div></div>
      <div class="metric"><div class="k">≈ стоимость</div><div class="v">${fmtUsd(a.costUsd)}</div></div>
      ${ctx}
    </div>
    ${body}
  </div>`;
}

// ----- documentation tab (knowledge tree + force-directed graph) -----
let kbData = null, graphRAF = null, graphNodes = [], graphEdges = [], selNode = null;
function stopGraph(){ if(graphRAF){ cancelAnimationFrame(graphRAF); graphRAF = null; } }

async function docsTick(){
  try {
    kbData = await api("/knowledge?slug=" + encodeURIComponent(SLUG)) || {};
    renderDocs();
  } catch(e){ /* server may be restarting */ }
}
function renderDocs(){
  const root = $("#docs");
  if(!kbData || !kbData.exists){
    root.innerHTML = `<p class="empty">База знаний ещё не создана. Она появится в <code>docs/knowledge/</code> по мере работы (фаза IMPLEMENT).</p>`;
    return;
  }
  root.innerHTML = `<div class="docs-grid">
    <div class="doc-tree">
      <input class="search" id="doc-search" placeholder="Поиск по файлам…">
      <div id="doc-tree-body"></div>
    </div>
    <div class="doc-main">
      <div class="graph-card">
        <div class="graph-legend">
          <span class="lk"><i style="background:#8b5cf6"></i>документ</span>
          <span class="lk"><i style="background:#10b981"></i>код</span>
          <span class="lk"><i style="background:var(--accent)"></i>в этой задаче</span>
        </div>
        <svg class="graph" id="kgraph" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="doc-viewer" id="doc-viewer"><p class="empty">Выберите документ в дереве или узел графа.</p></div>
    </div>
  </div>`;
  $("#doc-tree-body").innerHTML = renderTree(kbData.tree, 0);
  $("#doc-tree-body").querySelectorAll(".tnode.file").forEach(el => el.onclick = () => openDoc(el.dataset.path));
  $("#doc-search").addEventListener("input", e => filterTree(e.target.value.toLowerCase()));
  buildGraph(kbData.graph || {nodes:[],edges:[]});
}
function renderTree(node, depth){
  if(!node) return "";
  const gnodes = (kbData.graph && kbData.graph.nodes) || [];
  if(node.type === "dir"){
    const kids = (node.children||[]).map(c => renderTree(c, depth+1)).join("");
    const head = depth === 0 ? "" : `<div class="tnode dir"><span>📁 ${esc(node.name)}</span></div>`;
    return head + (depth===0 ? kids : `<div class="tchildren">${kids}</div>`);
  }
  const touched = (gnodes.find(n => n.id === node.path)||{}).touched;
  return `<div class="tnode file ${touched?'touched':''}" data-path="${esc(node.path)}" title="${esc(node.path)}">
    <span class="tdot" style="background:#8b5cf6"></span><span class="tlabel">${esc(node.name)}</span></div>`;
}
function filterTree(q){
  $("#doc-tree-body").querySelectorAll(".tnode.file").forEach(el => {
    el.style.display = !q || el.dataset.path.toLowerCase().includes(q) ? "" : "none";
  });
}
async function openDoc(path){
  selNode = path;
  if(!graphRAF) drawGraph();
  $("#doc-tree-body") && $("#doc-tree-body").querySelectorAll(".tnode.file").forEach(el => el.classList.toggle("active", el.dataset.path === path));
  const v = $("#doc-viewer"); if(!v) return;
  const head = `<div class="dv-head"><span class="dv-path">${esc(path)}</span></div>`;
  if(!path.endsWith(".md")){ v.innerHTML = head + `<p class="empty">Это файл кода. Граф показывает, какие документы на него ссылаются.</p>`; return; }
  v.innerHTML = `<p class="empty">Загрузка…</p>`;
  const r = await api("/knowledge?slug=" + encodeURIComponent(SLUG) + "&file=" + encodeURIComponent(path));
  v.innerHTML = head + (r && r.content != null ? `<div class="md">${md(r.content)}</div>` : `<p class="empty">Не удалось загрузить файл.</p>`);
}

// --- force-directed layout (vanilla SVG, animated with cooling) ---
const GW = 1000, GH = 620, NODE_COL = { doc:"#8b5cf6", code:"#10b981" };
function buildGraph(g){
  stopGraph();
  const byId = {};
  const list = g.nodes || [];
  graphNodes = list.map((n,i) => {
    const ang = (i / Math.max(1, list.length)) * Math.PI*2;
    const o = { ...n, x: GW/2 + Math.cos(ang)*200 + (i%7)*3, y: GH/2 + Math.sin(ang)*200 + (i%5)*3, vx:0, vy:0, fx:null, fy:null };
    byId[n.id] = o; return o;
  });
  graphEdges = (g.edges||[]).filter(e => byId[e.from] && byId[e.to]).map(e => ({ s: byId[e.from], t: byId[e.to] }));
  const deg = {};
  graphEdges.forEach(e => { deg[e.s.id]=(deg[e.s.id]||0)+1; deg[e.t.id]=(deg[e.t.id]||0)+1; });
  graphNodes.forEach(n => n.r = 6 + Math.min(8, (deg[n.id]||0)*1.6));
  const svg = $("#kgraph"); if(!svg) return;
  if(!graphNodes.length){ svg.innerHTML = `<text x="500" y="310" text-anchor="middle" fill="#999">Нет связей для отображения</text>`; return; }
  let alpha = 1;
  function stepFrame(){
    alpha *= 0.985;
    for(let i=0;i<graphNodes.length;i++){
      const a = graphNodes[i];
      for(let j=i+1;j<graphNodes.length;j++){
        const b = graphNodes[j];
        let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy || 0.01, d = Math.sqrt(d2), f = 1400/d2;
        const ux = dx/d, uy = dy/d;
        a.vx += ux*f; a.vy += uy*f; b.vx -= ux*f; b.vy -= uy*f;
      }
    }
    graphEdges.forEach(e => {
      let dx = e.t.x-e.s.x, dy = e.t.y-e.s.y, d = Math.sqrt(dx*dx+dy*dy)||0.01, f = (d-90)*0.02, ux=dx/d, uy=dy/d;
      e.s.vx += ux*f; e.s.vy += uy*f; e.t.vx -= ux*f; e.t.vy -= uy*f;
    });
    graphNodes.forEach(n => {
      n.vx += (GW/2 - n.x)*0.002; n.vy += (GH/2 - n.y)*0.002;
      n.vx *= 0.85; n.vy *= 0.85;
      if(n.fx!=null){ n.x = n.fx; n.y = n.fy; } else { n.x += n.vx*alpha*4; n.y += n.vy*alpha*4; }
      n.x = Math.max(30, Math.min(GW-30, n.x)); n.y = Math.max(24, Math.min(GH-24, n.y));
    });
    drawGraph();
    if(alpha > 0.03) graphRAF = requestAnimationFrame(stepFrame); else graphRAF = null;
  }
  stepFrame();
}
function drawGraph(){
  const svg = $("#kgraph"); if(!svg) return;
  let adj = null;
  if(selNode){ adj = new Set([selNode]); graphEdges.forEach(e => { if(e.s.id===selNode||e.t.id===selNode){ adj.add(e.s.id); adj.add(e.t.id); } }); }
  const edges = graphEdges.map(e => {
    const hot = selNode && (e.s.id===selNode || e.t.id===selNode);
    return `<line class="edge ${hot?'hot':''}" x1="${e.s.x.toFixed(1)}" y1="${e.s.y.toFixed(1)}" x2="${e.t.x.toFixed(1)}" y2="${e.t.y.toFixed(1)}"/>`;
  }).join("");
  const nodes = graphNodes.map(n => {
    const dim = adj && !adj.has(n.id) ? "dim" : "";
    const col = n.touched ? "var(--accent)" : (NODE_COL[n.type]||"#888");
    const short = n.label.length>22 ? n.label.slice(0,20)+"…" : n.label;
    return `<g class="node ${n.touched?'touched':''} ${n.id===selNode?'sel':''} ${dim}" data-id="${esc(n.id)}" transform="translate(${n.x.toFixed(1)},${n.y.toFixed(1)})">
      <circle r="${n.r.toFixed(1)}" fill="${col}"></circle><text x="${(n.r+3).toFixed(1)}" y="4">${esc(short)}</text></g>`;
  }).join("");
  svg.innerHTML = `<g class="edges">${edges}</g><g class="nodes">${nodes}</g>`;
  svg.querySelectorAll(".node").forEach(el => el.addEventListener("pointerdown", e => startDrag(e, el.dataset.id)));
}
let dragMoved = false;
function svgPt(e){ const svg = $("#kgraph"), r = svg.getBoundingClientRect(); return { x:(e.clientX-r.left)/r.width*GW, y:(e.clientY-r.top)/r.height*GH }; }
function startDrag(e, id){
  e.preventDefault(); dragMoved = false;
  const n = graphNodes.find(x => x.id===id); if(!n) return;
  const move = ev => { const p = svgPt(ev); n.fx = p.x; n.fy = p.y; n.x = p.x; n.y = p.y; dragMoved = true; if(!graphRAF) drawGraph(); };
  const up = () => {
    document.removeEventListener("pointermove", move); document.removeEventListener("pointerup", up);
    n.fx = null; n.fy = null;
    if(!dragMoved) openDoc(id);
  };
  document.addEventListener("pointermove", move); document.addEventListener("pointerup", up);
}

// ----- chat (checkpoint steering) -----
let chatOpen = false, chatMsgs = [], chatSeen = 0;
function toggleChat(open){
  chatOpen = open != null ? open : !chatOpen;
  $("#chat-panel").hidden = !chatOpen;
  if(chatOpen){
    chatSeen = chatMsgs.length;
    $("#chat-unread").hidden = true;
    renderChat();
    setTimeout(() => { const l = $("#chat-log"); l.scrollTop = l.scrollHeight; $("#chat-text").focus(); }, 0);
  }
}
$("#btn-chat-toggle").onclick = () => toggleChat();
$("#chat-close").onclick = () => toggleChat(false);

async function chatTick(){
  try {
    const r = await api("/chat?slug=" + encodeURIComponent(SLUG));
    const next = (r && r.messages) || [];
    const changed = next.length !== chatMsgs.length;
    chatMsgs = next;
    if(changed) renderChat();
    updateChatUnread();
  } catch(e){ /* server may be restarting */ }
}
function updateChatUnread(){
  const b = $("#chat-unread");
  if(chatOpen){ chatSeen = chatMsgs.length; b.hidden = true; return; }
  const unread = Math.max(0, chatMsgs.length - chatSeen);
  if(unread > 0){ b.hidden = false; b.textContent = unread > 9 ? "9+" : unread; }
  else b.hidden = true;
}
function renderChat(){
  const log = $("#chat-log");
  if(!chatMsgs.length){ log.innerHTML = `<p class="empty">Сообщений пока нет. Напишите агенту — он прочитает и ответит на ближайшем чекпоинте.</p>`; return; }
  const atBottom = log.scrollHeight - log.scrollTop - log.clientHeight < 60;
  log.innerHTML = chatMsgs.map(m => `<div class="msg ${m.role==='agent'?'agent':'human'}">
    <div class="who">${m.role==='agent'?'агент':'вы'}</div>
    <div>${m.role==='agent'?md(m.text):esc(m.text)}</div>
    ${m.ts?`<div class="ts">${esc(String(m.ts).replace('T',' ').slice(0,16))}</div>`:""}
  </div>`).join("");
  if(atBottom || chatOpen) log.scrollTop = log.scrollHeight;
}
async function sendChat(){
  const ta = $("#chat-text"), text = ta.value.trim();
  if(!text) return;
  ta.value = "";
  await api("/chat", { method:"POST", body: JSON.stringify({ slug:SLUG, text, phase: (lastData&&lastData.phase)||"" }) });
  await chatTick();
  toast("Отправлено агенту");
}
$("#chat-send").onclick = sendChat;
$("#chat-text").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendChat(); }
});

// ----- polling loop -----
async function tick(){
  try {
    const [data, replies] = await Promise.all([
      api("/data?slug=" + encodeURIComponent(SLUG)),
      api("/replies?slug=" + encodeURIComponent(SLUG)),
    ]);
    const stamp = JSON.stringify([data.updatedAt, data.phase, data.status, (replies.replies||[]).length]);
    if(stamp !== lastDataStamp){ lastDataStamp = stamp; render(data, replies); }
  } catch(e){ /* server may be restarting */ }
}
(async function init(){
  await loadDraft();
  await tick();
  setInterval(tick, 3000);
  chatTick();
  setInterval(chatTick, 5000);
})();
</script>
